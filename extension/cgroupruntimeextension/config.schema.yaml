$defs:
  go_max_procs_config:
    type: object
    properties:
      enabled:
        type: boolean
  go_mem_limit_config:
    type: object
    properties:
      enabled:
        type: boolean
      ratio:
        type: number
        x-customType: float64
      refresh_interval:
        description: RefreshInterval configures the refresh interval for GOMEMLIMIT. Setting the duration to 0 (default) disables periodic auto update.
        type: string
        format: duration
type: object
properties:
  gomaxprocs:
    $ref: go_max_procs_config
  gomemlimit:
    $ref: go_mem_limit_config
