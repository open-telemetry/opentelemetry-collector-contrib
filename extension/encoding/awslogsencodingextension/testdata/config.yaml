aws_logs_encoding:

aws_logs_encoding/cloudwatch:
  format: cloudwatch

aws_logs_encoding/text_vpcflow:
  format: vpcflow
  vpcflow:
    file_format: plain-text

aws_logs_encoding/parquet_vpcflow:
  format: vpcflow
  vpcflow:
    file_format: parquet

aws_logs_encoding/invalid_vpcflow:
  format: vpcflow
  vpcflow:
    file_format: invalid

aws_logs_encoding/s3access:
  format: s3access

aws_logs_encoding/waf:
  format: waf

aws_logs_encoding/cloudtrail:
  format: cloudtrail

aws_logs_encoding/elbaccess:
  format: elbaccess

aws_logs_encoding/networkfirewall:
  format: networkfirewall

aws_logs_encoding/cw_routing:
  format: cloudwatch
  cloudwatch:
    streams:
      - name: vpcflow
        encoding: aws_logs_encoding/vpcflow_inner
      - name: payment-lambda
        log_group_pattern: "/aws/lambda/payment-*"
        encoding: aws_logs_encoding/lambda_inner
      - name: catchall
        log_group_pattern: "*"
        encoding: aws_logs_encoding/raw

aws_logs_encoding/cw_routing_invalid_format:
  format: vpcflow
  cloudwatch:
    streams:
      - name: foo
        log_group_pattern: "/aws/lambda/*"
        encoding: aws_logs_encoding/inner

aws_logs_encoding/cw_routing_missing_name:
  format: cloudwatch
  cloudwatch:
    streams:
      - log_group_pattern: "/aws/lambda/*"
        encoding: aws_logs_encoding/inner

aws_logs_encoding/cw_routing_missing_encoding:
  format: cloudwatch
  cloudwatch:
    streams:
      - name: foo
        log_group_pattern: "/aws/lambda/*"

aws_logs_encoding/cw_routing_unknown_name:
  format: cloudwatch
  cloudwatch:
    streams:
      - name: not-a-known-service
        encoding: aws_logs_encoding/inner

aws_logs_encoding/cw_routing_duplicate_name:
  format: cloudwatch
  cloudwatch:
    streams:
      - name: vpcflow
        encoding: aws_logs_encoding/a
      - name: vpcflow
        encoding: aws_logs_encoding/b
