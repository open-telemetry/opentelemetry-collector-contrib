google_cloud_logentry_encoding:

google_cloud_logentry_encoding/default:
  handle_json_payload_as: "json"
  handle_proto_payload_as: "json"

google_cloud_logentry_encoding/json_as_text:
  handle_json_payload_as: "text"

google_cloud_logentry_encoding/proto_as_text:
  handle_proto_payload_as: "text"

google_cloud_logentry_encoding/proto_as_protobuf:
  handle_proto_payload_as: "protobuf"

