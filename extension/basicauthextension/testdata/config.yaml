basicauth:

basicauth/client:
  client_auth:
    username: username
    password: password

basicauth/server:
  htpasswd:
    inline: |
      username1:password1
      username2:password2

basicauth/both:
  client_auth:
    username: user
    password: pass
  htpasswd:
    file: /etc/nginx/htpasswd

basicauth/client_aws:
  client_auth:
    aws_secret:
      secret_arn: "arn:aws:secretsmanager:us-east-1:123456789012:secret:my-creds"
      region: "us-east-1"
      username_key: "username"
      password_key: "password"
      refresh_interval: 5m

basicauth/server_aws:
  htpasswd:
    aws_secret:
      secret_arn: "arn:aws:secretsmanager:us-east-1:123456789012:secret:my-htpasswd"
      region: "us-east-1"
      value_key: "htpasswd_content"
      refresh_interval: 10m
