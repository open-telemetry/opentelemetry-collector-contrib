$defs:
  aws_secrets_manager_settings:
    description: AWSSecretsManagerSettings configures credential retrieval from AWS Secrets Manager. The secret must be a JSON object containing the username and password fields. Credentials are polled at the configured interval and rotated in place without restarting the collector.
    type: object
    properties:
      password_key:
        description: PasswordKey is the JSON key for the password field. Defaults to "password".
        type: string
      refresh_interval:
        description: RefreshInterval controls how often the secret is polled for changes. Defaults to 1h.
        type: string
        format: duration
      region:
        description: Region is the AWS region. If empty, the SDK default chain is used (AWS_REGION env var, instance metadata, etc.).
        type: string
      secret_arn:
        description: SecretARN is the ARN (or name) of the secret in AWS Secrets Manager. Required.
        type: string
      username_key:
        description: UsernameKey is the JSON key for the username field. Defaults to "username".
        type: string
  client_auth_settings:
    type: object
    properties:
      aws_secrets_manager:
        description: AWSSecretsManager configures credential retrieval from AWS Secrets Manager. Mutually exclusive with Username, UsernameFile, Password, and PasswordFile.
        x-pointer: true
        $ref: aws_secrets_manager_settings
      password:
        description: Password holds the password to use for client authentication.
        $ref: go.opentelemetry.io/collector/config/configopaque.string
      password_file:
        description: PasswordFile points to a file that contains the password. If set, takes precedence over Password. The file is watched for changes.
        type: string
      username:
        description: Username holds the username to use for client authentication.
        type: string
      username_file:
        description: UsernameFile points to a file that contains the username. If set, takes precedence over Username. The file is watched for changes.
        type: string
  htpasswd_settings:
    type: object
    properties:
      file:
        description: Path to the htpasswd file.
        type: string
      inline:
        description: Inline contents of the htpasswd file.
        type: string
type: object
properties:
  client_auth:
    description: ClientAuth settings
    x-pointer: true
    $ref: client_auth_settings
  htpasswd:
    description: Htpasswd settings.
    x-pointer: true
    $ref: htpasswd_settings
