# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. receiver/filelog)
component: all

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add vulnerability exclusion support to govulncheck Makefile target with justifications for ignored vulnerabilities (GO-2026-4887, GO-2026-4883, GO-2026-4514, GO-2022-0635, GO-2022-0646, GO-2026-4762)

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [47350]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The govulncheck target now supports an IGNORED_VULNS list to exclude known vulnerabilities that don't affect the project:
  - GO-2026-4887, GO-2026-4883: Moby/Docker daemon vulnerabilities (only affects daemon, not client usage)
  - GO-2026-4514: jsonparser Delete function panic (requires malformed input)
  - GO-2022-0635, GO-2022-0646: AWS S3 Crypto SDK vulnerabilities (not used by collector)
  - GO-2026-4762: gRPC-Go authorization bypass (only affects servers, test modules use older versions)
  - GO-2026-4514: jsonparser Delete function panic on malformed JSON (no fix available; requires invalid input)
  - GO-2022-0635, GO-2022-0646: AWS S3 Crypto SDK vulnerabilities (deprecated v1 SDK; collector doesn't use crypto features)
  Added gojq as a build tool for JSON parsing instead of relying on Docker.
