# Use this changelog template to create an entry for release notes.

change_type: enhancement

component: processor/coralogix

note: Add an optional critical-path feature to annotate complete traces with Coralogix critical-path span attributes.

issues: [0]

subtext: |
  The new `critical_path.enabled` option computes `cgx.critical_path`, `cgx.critical_path.exclusive_ns`, and `cgx.critical_path.inclusive_ns`.
  Example:
  `processors:
    coralogix:
      critical_path:
        enabled: true`

