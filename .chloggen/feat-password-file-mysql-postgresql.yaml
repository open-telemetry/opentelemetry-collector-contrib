change_type: enhancement

component: receiver/mysql

note: Add `password_file` config option to load the database password from a file at connection time, enabling credential rotation without restarting the collector.

issues: [48387]

subtext: |
  `password` and `password_file` are mutually exclusive; exactly one must be set.
  The file is read on each new connection, so password rotation takes effect without a restart.

