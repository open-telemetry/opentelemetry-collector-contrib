change_type: bug_fix
component: exporter/kafka
note: Fix collector hanging indefinitely on shutdown when the Kafka broker is unreachable
issues: [48140]
subtext: >
  Re-enables the exporterhelper timeout sender (previously disabled with a zero
  timeout) so that each send attempt is bounded by the configured timeout
  (default 5s). The per-attempt context is now passed through to ProduceSync,
  allowing in-flight sends to unblock when the broker is unreachable.
  FranzSyncProducer.Close also cancels the kgo client context before calling
  client.Close, ensuring shutdown completes promptly.
