change_type: breaking

component: jaegerremotesampling

note: Require explicit `grpc:` configuration to keep the default gRPC sampling endpoint and add HTTP/gRPC port conflict validation
issues: [45944]
subtext: |
  The jaegerremotesampling extension now validates that HTTP and gRPC servers
  are configured on different ports during configuration loading, preventing
  runtime port binding failures and providing clear, actionable error messages
  for misconfigurations.

  This change is breaking: the extension no longer starts a gRPC server on
  port 14250 by default when `grpc:` is omitted from the YAML configuration.
  Users who relied on the previous default must now configure `grpc:`
  explicitly to keep the gRPC sampling endpoint.
