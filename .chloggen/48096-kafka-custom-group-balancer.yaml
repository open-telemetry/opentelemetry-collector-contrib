change_type: enhancement

component: receiver/kafka

note: Add support for custom consumer-group partition-assignment strategies via extensions that implement `kgo.GroupBalancer`. Set `group_rebalance_strategy` to the component ID of a registered extension to use a custom balancer.

issues: [48096]

subtext: |
  The four built-in strategies (`range`, `roundrobin`, `sticky`, `cooperative-sticky`) continue to work unchanged.
  Any other value for `group_rebalance_strategy` is now resolved as an extension component ID at runtime.

