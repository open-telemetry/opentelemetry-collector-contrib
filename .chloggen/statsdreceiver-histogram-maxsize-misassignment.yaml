# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: bug_fix

# The name of the component, or a single word describing the area of concern, (e.g. receiver/filelog)
component: statsdreceiver

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Apply the configured histogram `max_size` (and explicit buckets) to the correct metric category so it takes effect for `histogram`/`distribution` types.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [48908]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  In Initialize() the timer_histogram_mapping for `histogram`/`distribution` wrote the
  exponential-histogram config (max_size) onto timerEvents instead of histogramEvents,
  and the `timing` mapping wrote explicit buckets onto histogramEvents instead of
  timerEvents. As a result, max_size configured on a `distribution`/`histogram` mapping
  was silently ignored and those metrics always used the go-expohisto default (160),
  while explicit buckets on a `timing` mapping never applied. Each statsd_type now
  configures the category that actually serves it.

