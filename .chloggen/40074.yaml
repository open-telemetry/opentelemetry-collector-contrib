# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. filelogreceiver)
component: coralogixexporter

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Added a mechanism to drop telemetry data when rate limit, quota or authorization errors are encountered.


# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [40074]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Added the feature gate `exporter.coralogix.enableRateLimiter` to enable a rate limiter mechanism.
  When the feature gate is enabled, the exporter will drop telemetry data during some time
  when rate limit, quota or authorization errors are encountered.

  To configure the threshold and duration, use the following environment variables:
  - `CORALOGIX_EXPORTER_RATE_LIMIT_THRESHOLD` - the threshold for the number of errors to trigger the rate limiter (default: 10)
  - `CORALOGIX_EXPORTER_RATE_LIMIT_DURATION` - the duration of the rate limit window (default: 1 minute)

