# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. receiver/filelog)
component: receiver/mongodb

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add Query Sample collection to the MongoDB receiver, emitting a `db.server.query_sample` log event for each currently executing operation.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [48573]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Samples are sourced from the `$currentOp` aggregation pipeline, filtered to exclude idle
  connections and noisy administrative commands (`hello`, `ping`, `isMaster` on the `admin`/`local`
  namespaces). Each event carries the obfuscated query text plus operation metadata such as
  `db.operation.id`, `mongodb.operation.type`, `mongodb.operation.comment`, plan summary, wait
  details, cursor statistics, client application info, and effective user. See `documentation.md`
  for the full attribute list.
  The `logs` signal is at `development` stability; the event schema and attribute names may change
  in backwards-incompatible ways as this functionality matures and as OpenTelemetry semantic
  conventions for `db.server.query_sample` stabilize. The `metrics` signal remains at `beta`.

