# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. receiver/filelog)
component: receiver/oracledb

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: "Add workload analysis metrics (scans, enqueue, LOB, parse, sort, cursor, session activity) sourced from the existing v$sysstat scrape."

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [48808]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Adds sixteen new opt-in metrics (disabled by default, stability: development) that
  surface previously discarded v$sysstat counters for SQL workload analysis. The
  schema follows the dotted-namespace pattern established in PR #48335 and reuses
  the disk.io.direction attribute introduced there:
    - oracledb.scan.table, oracledb.scan.table.rows, oracledb.scan.index_fast_full
      (attribute: oracledb.scan.type)
    - oracledb.enqueue.operations (attribute: oracledb.enqueue.kind)
    - oracledb.lob.operations (attribute: disk.io.direction, reused from PR #48335)
    - oracledb.parse.time (attribute: oracledb.parse.kind)
    - oracledb.sort.operations (attribute: oracledb.sort.medium), oracledb.sort.rows
    - oracledb.cursor.cache.hits, oracledb.cursor.cache.size, oracledb.cursor.open
    - oracledb.call.user, oracledb.call.recursive, oracledb.call.recursive_cpu_time
    - oracledb.db_time, oracledb.session.logon
  Time-based metrics (oracledb.parse.time, oracledb.call.recursive_cpu_time,
  oracledb.db_time) report seconds; the raw centisecond values from v$sysstat are
  divided by 100 in the scraper. No new SQL queries are introduced; the existing
  SELECT * FROM v$sysstat scrape already returns all required rows, so there is
  zero additional load on monitored Oracle instances.

