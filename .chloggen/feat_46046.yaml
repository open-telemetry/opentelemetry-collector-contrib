# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: "breaking"

# The name of the component, or a single word describing the area of concern, (e.g. receiver/filelog)
component: "processor/resourcedetection"

# A brief description of the change.  Surround your text with quotes ("") if it needs to start with a backtick (`).
note: "Add feature gate to control EC2 instance tag retrieval method (IMDS vs DescribeTags API)"

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [46046]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Introduces the `processor.resourcedetection.ec2.getTagsFromIMDS` feature gate (Beta, enabled by default).
  When enabled, EC2 instance tags are fetched exclusively via IMDS, which does not require any IAM
  permissions but requires `InstanceMetadataTags=enabled` on the instance.
  When disabled, tags are fetched exclusively via the EC2 `DescribeTags` API (legacy behavior),
  which requires the `ec2:DescribeTags` IAM permission.
  To revert to the legacy behavior, start the collector with `--feature-gates=-processor.resourcedetection.ec2.getTagsFromIMDS`.

