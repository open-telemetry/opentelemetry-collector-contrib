name: build-and-test-experimental
# Shadow of every job in build-and-test.yml that fires on a pull_request,
# with the proposed CI improvements layered in. NOT REQUIRED for merging --
# all job names are prefixed `exp-` so they cannot match branch-protection
# rules. Jobs gated to push/tag/main events in the required workflow
# (publish-dev, publish-stable, rotate-milestone, flakytests-generate-issues)
# are intentionally omitted because they never run on PRs.

on:
  pull_request:

permissions: read-all

env:
  TEST_RESULTS: testbed/tests/results/junit/results.xml
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  exp-setup-environment:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-check-collector-module-version:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: make genotelcontribcol
      - name: Check Collector Module Version
        run: ./.github/workflows/scripts/check-collector-module-version.sh

  # Classifies the PR's change set so scoped *-affected jobs know whether to
  # run, fall back to full, or skip entirely.
  exp-detect-scope:
    runs-on: ubuntu-24.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    outputs:
      mode: ${{ steps.decide.outputs.mode }}
      go_sources: ${{ steps.decide.outputs.go_sources }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: decide
        shell: bash
        env:
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          FILE_CAP: '50'
        run: |
          set -euo pipefail
          base=$(git merge-base origin/main "$PR_HEAD")
          changed=$(git diff --name-only --diff-filter=ACMRTUXB "$base" "$PR_HEAD")
          echo "Changed files:"
          echo "$changed"

          # Any of these paths change CI behavior or coverage, so require the full matrices.
          # cmd/otelcontribcol/ is the assembly layer for the binary; any change there
          # (Go source, builder-config.yaml, Dockerfile, etc.) must run the full cross-compile.
          # TEMPORARY (revert before merge): `.github/workflows/` removed so this PR can exercise the scoped paths on CI.
          trigger='^(\.golangci\.yml$|Makefile$|Makefile\.Common$|\.github/actions/|go\.mod$|cmd/otelcontribcol/)'
          if echo "$changed" | grep -qE "$trigger"; then
            echo "Full-scope trigger matched; running full lint and integration matrices."
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          go_sources=$(echo "$changed" | grep -E '\.go$' | grep -vE '_test\.go$' || true)
          if [ -z "$go_sources" ]; then
            echo "No Go source changes; skipping scoped jobs."
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          count=$(echo "$go_sources" | wc -l | tr -d ' ')
          if [ "$count" -gt "$FILE_CAP" ]; then
            echo "Changed Go source count $count exceeds cap $FILE_CAP; falling back to full matrices."
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Scoping to $count changed source file(s)."
          {
            echo "mode=scoped"
            echo 'go_sources<<EOF'
            echo "$go_sources"
            echo EOF
          } >> "$GITHUB_OUTPUT"

  exp-lint-matrix:
    strategy:
      fail-fast: false
      matrix:
        goos:
          - windows
          - linux
        group:
          - receiver-0
          - receiver-1
          - receiver-2
          - receiver-3
          - processor-0
          - processor-1
          - exporter-0
          - exporter-1
          - exporter-2
          - exporter-3
          - extension
          - connector
          - internal
          - pkg
          - cmd-0
          - other
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: |
      always() &&
      needs.exp-setup-environment.result == 'success' &&
      needs.exp-detect-scope.outputs.mode == 'full'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Lint
        run: GOOS=${{ matrix.goos }} GOARCH=amd64 make -j2 golint GROUP=${{ matrix.group }}
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-lint-affected:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Lint affected modules
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
        run: GOOS=${{ matrix.goos }} GOARCH=amd64 make for-affected-components CMD="make lint"
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-lint:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope, exp-lint-matrix, exp-lint-affected]
    steps:
      - name: Interpret result
        env:
          MODE: ${{ needs.exp-detect-scope.outputs.mode }}
          MATRIX_RESULT: ${{ needs.exp-lint-matrix.result }}
          AFFECTED_RESULT: ${{ needs.exp-lint-affected.result }}
        run: |
          case "$MODE" in
            scoped) check="$AFFECTED_RESULT" ;;
            full|'') check="$MATRIX_RESULT" ;;
            skip) check='success' ;;
            *) echo "Unexpected mode: $MODE"; exit 1 ;;
          esac
          echo "mode=$MODE matrix=$MATRIX_RESULT affected=$AFFECTED_RESULT check=$check"
          if [[ "$check" != "success" ]]; then
            echo "Lint failed."
            exit 1
          fi
          echo "Lint passed."

  exp-govulncheck:
    strategy:
      fail-fast: false
      matrix:
        group:
          - receiver-0
          - receiver-1
          - receiver-2
          - receiver-3
          - processor-0
          - processor-1
          - exporter-0
          - exporter-1
          - exporter-2
          - exporter-3
          - extension
          - connector
          - internal
          - pkg
          - cmd-0
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [exp-setup-environment]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Run `govulncheck`
        run: make gogovulncheck GROUP=${{ matrix.group }}
      - run: ./.github/workflows/scripts/check-disk-space.sh

  # Split the 18 checks/codegen targets across parallel matrix shards. Each
  # shard gets a fresh runner + checkout so the file-modifying targets
  # (goporto, gogci, gotidy, crosslink, generate) don't trample each other
  # inside a single working tree. Wall time is bounded by the slowest shard.
  exp-checks:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    strategy:
      fail-fast: false
      matrix:
        shard:
          - codegen
          - porto-and-gci
          - go-mod-hygiene
          - small-generators
          - schemas-and-templates
          - read-only-checks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - run: make genotelcontribcol
      - name: Run shard ${{ matrix.shard }}
        run: |
          set -euo pipefail
          case "${{ matrix.shard }}" in
            codegen)
              make generate
              if [[ -n $(git status -s) ]]; then
                echo 'Generated code is out of date, please run "make generate" and commit the changes in this PR.'
                exit 1
              fi
              ;;
            porto-and-gci)
              make -j2 goporto
              git diff --exit-code || (echo 'Porto links are out of date, please run "make goporto" and commit the changes in this PR.' && exit 1)
              make gogci
              git diff --exit-code || (echo 'go package imports not formatted, please run "make gogci" and commit the changes in this PR.' && exit 1)
              ;;
            go-mod-hygiene)
              make crosslink
              git diff --exit-code || (echo 'Replace statements are out of date, please run "make crosslink" and commit the changes in this PR.' && exit 1)
              make tidylist
              git diff --exit-code || (echo 'Tidylist is out of date, please run "make tidylist" and commit the changes in this PR.' && exit 1)
              make gotidy
              git diff --exit-code || (echo 'go.mod/go.sum deps changes detected, please run "make gotidy" and commit the changes in this PR.' && exit 1)
              ;;
            small-generators)
              make gendistributions
              git diff -s --exit-code || (echo 'Generated code is out of date, please run "make gendistributions" and commit the changes in this PR.' && exit 1)
              make genlabels
              git diff -s --exit-code || (echo '.github/component_labels.txt is out of date, please run "make genlabels" and commit the changes in this PR.' && exit 1)
              make gencodecov
              git --no-pager diff
              git diff -s --exit-code '.codecov.yml' || (echo '.codecov.yml is out of date, please run "make gencodecov" and commit the changes in this PR.' && exit 1)
              ;;
            schemas-and-templates)
              make generate-gh-issue-templates
              git diff --exit-code '.github/ISSUE_TEMPLATE' || (echo 'Dropdowns in issue templates are out of date, please run "make generate-gh-issue-templates" and commit the changes in this PR.' && exit 1)
              make generate-schemas
              git diff --exit-code '*.schema.yaml' || (echo 'Config schemas are out of date, please run "make generate-schemas" and commit the changes in this PR.' && exit 1)
              make generate-chloggen-components
              git diff --exit-code || (echo '.chloggen/config.yaml is out of date, please run "make generate-chloggen-components" and commit the changes.' && exit 1)
              ;;
            read-only-checks)
              make checkdoc
              make checkmetadata
              make checkapi
              make multimod-verify
              ;;
            *)
              echo "Unknown shard: ${{ matrix.shard }}"
              exit 1
              ;;
          esac
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-unittest-matrix:
    strategy:
      fail-fast: false
      matrix:
        # Experimental fires on PRs only; drop stable Go entirely since the
        # required workflow still runs both versions on push/main and merge_group.
        go-version: [oldstable]
        runner: [ubuntu-24.04]
        group:
          - receiver-0
          - receiver-1
          - receiver-2
          - receiver-3
          - processor-0
          - processor-1
          - exporter-0
          - exporter-1
          - exporter-2
          - exporter-3
          - extension
          - connector
          - internal
          - pkg
          - cmd-0
          - other
    runs-on: ${{ matrix.runner }}
    needs: [exp-setup-environment, exp-detect-scope]
    if: |
      always() &&
      needs.exp-setup-environment.result == 'success' &&
      needs.exp-detect-scope.outputs.mode == 'full'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Test Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/go-build
          key: go-test-build-experimental-${{ runner.os }}-${{ matrix.go-version }}-${{ matrix.runner }}-${{ hashFiles('**/go.sum') }}
      - run: ./.github/workflows/scripts/check-disk-space.sh
      - name: Run Unit Tests
        id: tests
        run: make gotest GROUP=${{ matrix.group }}
      - name: Fail workflow if tests fails
        if: always()
        run: |
          if [[ "${{ steps.tests.outcome }}" == "failure" ]]; then
            echo "Tests failed. Failing workflow."
            exit 1
          else
            echo "Tests passed or were skipped. Continuing."
          fi

  exp-unittest-affected:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Test Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/go-build
          key: go-test-build-experimental-${{ runner.os }}-oldstable-affected-${{ hashFiles('**/go.sum') }}
      - run: ./.github/workflows/scripts/check-disk-space.sh
      - name: Run unit tests in affected modules
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
        run: make for-affected-components CMD="make test"
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-unittest:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope, exp-unittest-matrix, exp-unittest-affected]
    steps:
      - name: Interpret result
        env:
          MODE: ${{ needs.exp-detect-scope.outputs.mode }}
          MATRIX_RESULT: ${{ needs.exp-unittest-matrix.result }}
          AFFECTED_RESULT: ${{ needs.exp-unittest-affected.result }}
        run: |
          case "$MODE" in
            scoped) check="$AFFECTED_RESULT" ;;
            full|'') check="$MATRIX_RESULT" ;;
            skip) check='success' ;;
            *) echo "Unexpected mode: $MODE"; exit 1 ;;
          esac
          echo "mode=$MODE matrix=$MATRIX_RESULT affected=$AFFECTED_RESULT check=$check"
          if [[ "$check" != "success" ]]; then
            echo "Unit tests failed."
            exit 1
          fi
          echo "Unit tests passed."

  exp-coverage:
    runs-on: ubuntu-24.04
    needs: [exp-unittest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          pattern: coverage-artifacts-*
      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  exp-integration-tests-matrix:
    strategy:
      fail-fast: false
      matrix:
        group:
          - receiver-0
          - receiver-1
          - receiver-2
          - receiver-3
          - processor-0
          - processor-1
          - exporter-0
          - exporter-1
          - exporter-2
          - exporter-3
          - extension
          - connector
          - internal
          - pkg
          - cmd-0
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: |
      always() &&
      needs.exp-setup-environment.result == 'success' &&
      needs.exp-detect-scope.outputs.mode == 'full'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Docker images.
        uses: AndreKurait/docker-cache@0fe76702a40db986d9663c24954fc14c6a6031b7 # 0.6.0
        with:
          key: docker-experimental-${{ matrix.group }}
      - name: Run Integration Tests
        run: make gointegration-test GROUP=${{ matrix.group }}
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-integration-affected:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Docker images.
        uses: AndreKurait/docker-cache@0fe76702a40db986d9663c24954fc14c6a6031b7 # 0.6.0
        with:
          key: docker-experimental-affected
      - name: Run integration tests in affected modules
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
        run: make for-affected-components CMD="make mod-integration-test"
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-integration-sudo-tests-matrix:
    strategy:
      fail-fast: false
      matrix:
        group:
          - extension/cgroupruntimeextension
          - receiver/icmpcheckreceiver
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Docker images.
        uses: AndreKurait/docker-cache@0fe76702a40db986d9663c24954fc14c6a6031b7 # 0.6.0
        with:
          key: docker-experimental-${{ matrix.group }}
      - name: Run Integration Tests
        run: make --no-print-directory -C ${{ matrix.group }} mod-integration-sudo-test
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-integration-tests:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope, exp-integration-tests-matrix, exp-integration-affected, exp-integration-sudo-tests-matrix]
    steps:
      - name: Interpret result
        env:
          MODE: ${{ needs.exp-detect-scope.outputs.mode }}
          MATRIX_RESULT: ${{ needs.exp-integration-tests-matrix.result }}
          AFFECTED_RESULT: ${{ needs.exp-integration-affected.result }}
          SUDO_RESULT: ${{ needs.exp-integration-sudo-tests-matrix.result }}
        run: |
          case "$MODE" in
            scoped) check="$AFFECTED_RESULT" ;;
            full|'') check="$MATRIX_RESULT" ;;
            skip) check='success' ;;
            *) echo "Unexpected mode: $MODE"; exit 1 ;;
          esac
          echo "mode=$MODE matrix=$MATRIX_RESULT affected=$AFFECTED_RESULT sudo=$SUDO_RESULT check=$check"
          if [[ "$check" != "success" ]]; then
            echo "Integration tests failed."
            exit 1
          fi
          if [[ "$SUDO_RESULT" != "success" && "$SUDO_RESULT" != "skipped" ]]; then
            echo "Integration sudo tests failed (result=$SUDO_RESULT)."
            exit 1
          fi
          echo "Integration tests passed."

  exp-correctness-traces:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Correctness
        run: make -C testbed run-correctness-traces-tests
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-correctness-metrics:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Correctness
        run: make -C testbed run-correctness-metrics-tests
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-build-examples:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
          gomoddownload: "false"
      - run: make genotelcontribcol
      - name: Build Examples
        run: make build-examples
      - run: ./.github/workflows/scripts/check-disk-space.sh

  # Full arch matrix; only runs on mode=full since `go-build` caching on this
  # repo gets evicted before it can ever warm up (the 10 GB per-repo budget is
  # contended). On scoped PRs, exp-cross-compile-affected handles per-arch
  # verification at the changed-module level instead.
  exp-cross-compile:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: |
      always() &&
      needs.exp-setup-environment.result == 'success' &&
      needs.exp-detect-scope.outputs.mode == 'full'
    strategy:
      fail-fast: false
      matrix:
        os:
          - darwin
          - linux
          - windows
        arch:
          - 386
          - amd64
          - arm
          - arm64
          - ppc64le
          - riscv64
          - s390x
        include:
          - os: linux
            arch: arm
            arm: 7
          - os: aix
            arch: ppc64
        exclude:
          - os: darwin
            arch: 386
          - os: darwin
            arch: arm
          - os: darwin
            arch: ppc64le
          - os: darwin
            arch: riscv64
          - os: darwin
            arch: s390x
          - os: windows
            arch: arm
          - os: windows
            arch: ppc64le
          - os: windows
            arch: riscv64
          - os: windows
            arch: s390x
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Generate collector files
        run: make genotelcontribcol
      - name: Build Collector ${{ matrix.os }} ${{ matrix.arch }} ${{ matrix.arm }}
        run: make GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM=${{ matrix.arm }} otelcontribcol
      - name: Upload Collector Binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: experimental-collector-binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: ./bin/*
      - run: ./.github/workflows/scripts/check-disk-space.sh

  # Scoped cross-compile: on PRs that only touch a small set of Go sources,
  # verify those modules (and the modules that depend on them) build for each
  # supported platform without rebuilding the whole otelcontribcol binary.
  # cmd/otelcontribcol/ changes force mode=full in exp-detect-scope so the
  # assembly layer is always exercised by exp-cross-compile when it changes.
  exp-cross-compile-affected:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    strategy:
      fail-fast: false
      matrix:
        os:
          - darwin
          - linux
          - windows
        arch:
          - 386
          - amd64
          - arm
          - arm64
          - ppc64le
          - riscv64
          - s390x
        include:
          - os: linux
            arch: arm
            arm: 7
          - os: aix
            arch: ppc64
        exclude:
          - os: darwin
            arch: 386
          - os: darwin
            arch: arm
          - os: darwin
            arch: ppc64le
          - os: darwin
            arch: riscv64
          - os: darwin
            arch: s390x
          - os: windows
            arch: arm
          - os: windows
            arch: ppc64le
          - os: windows
            arch: riscv64
          - os: windows
            arch: s390x
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Build affected modules for ${{ matrix.os }}/${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }}
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.arm }}
        run: make for-affected-components CMD="go build ./..."
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-publish-check:
    runs-on: ubuntu-24.04
    needs: [exp-lint, exp-unittest, exp-integration-tests, exp-cross-compile]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/workflows/scripts/verify-dist-files-exist.sh
      - name: Download Binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          path: ./bin/
          pattern: experimental-collector-binaries-*
      - name: Verify Distribution Files Exist
        id: check
        run: ./.github/workflows/scripts/verify-dist-files-exist.sh
