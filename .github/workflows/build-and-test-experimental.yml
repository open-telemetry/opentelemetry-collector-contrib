name: build-and-test-experimental
# Shadow workflow that runs alongside build-and-test on every PR and produces
# data the required workflow does not. NOT REQUIRED for merging -- all job
# names are prefixed `exp-` so they cannot match branch-protection rules.
#
# Scope is intentionally narrow: only the jobs that exercise behavior unique
# to the proposed optimizations (scoped *-affected paths, cached cross-compile).
# Jobs that would 1:1 mirror the required workflow are omitted -- the required
# workflow already covers those, so duplicating them just burns runner time.

on:
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Classifies the PR's change set so the scoped *-affected jobs know whether
  # to run, fall through to full, or skip entirely.
  exp-detect-scope:
    runs-on: ubuntu-24.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    outputs:
      mode: ${{ steps.decide.outputs.mode }}
      go_sources: ${{ steps.decide.outputs.go_sources }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: decide
        shell: bash
        env:
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          FILE_CAP: '50'
        run: |
          set -euo pipefail
          base=$(git merge-base origin/main "$PR_HEAD")
          changed=$(git diff --name-only --diff-filter=ACMRTUXB "$base" "$PR_HEAD")
          echo "Changed files:"
          echo "$changed"

          # Any of these paths change CI behavior or coverage, so a real
          # rollout would fall back to the required workflow's full matrices.
          # TEMPORARY (revert before merge): `.github/workflows/` removed so this PR can exercise the scoped paths on CI.
          trigger='^(\.golangci\.yml$|Makefile$|Makefile\.Common$|\.github/actions/|go\.mod$)'
          if echo "$changed" | grep -qE "$trigger"; then
            echo "Full-scope trigger matched; experimental scoped jobs will be skipped."
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          go_sources=$(echo "$changed" | grep -E '\.go$' | grep -vE '_test\.go$' || true)
          if [ -z "$go_sources" ]; then
            echo "No Go source changes; experimental scoped jobs will be skipped."
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          count=$(echo "$go_sources" | wc -l | tr -d ' ')
          if [ "$count" -gt "$FILE_CAP" ]; then
            echo "Changed Go source count $count exceeds cap $FILE_CAP; experimental scoped jobs will be skipped."
            echo "mode=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Scoping experimental jobs to $count changed source file(s)."
          {
            echo "mode=scoped"
            echo 'go_sources<<EOF'
            echo "$go_sources"
            echo EOF
          } >> "$GITHUB_OUTPUT"

  exp-lint-affected:
    runs-on: ubuntu-24.04
    needs: [exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Lint affected modules
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
        run: GOOS=${{ matrix.goos }} GOARCH=amd64 make for-affected-components CMD="make lint"

  exp-integration-affected:
    runs-on: ubuntu-24.04
    needs: [exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Docker images.
        uses: AndreKurait/docker-cache@0fe76702a40db986d9663c24954fc14c6a6031b7 # 0.6.0
        with:
          key: docker-experimental-affected
      - name: Run integration tests in affected modules
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
        run: make for-affected-components CMD="make mod-integration-test"

  exp-unittest-affected:
    runs-on: ubuntu-24.04
    needs: [exp-detect-scope]
    if: needs.exp-detect-scope.outputs.mode == 'scoped'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Test Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/go-build
          key: go-test-build-experimental-${{ runner.os }}-oldstable-${{ hashFiles('**/go.sum') }}
      - name: Run unit tests in affected modules
        env:
          CHANGED_GOLANG_SOURCES: ${{ needs.exp-detect-scope.outputs.go_sources }}
        run: make for-affected-components CMD="make test"

  # Always runs (no detect-scope gating) so cache behavior can be observed
  # across PRs. Three archs are enough to validate the pattern across OS/arch
  # boundaries without doubling the cost of the required workflow's 13 shards.
  exp-cross-compile:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: windows
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/go-build
          key: cross-compile-experimental-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            cross-compile-experimental-${{ matrix.os }}-${{ matrix.arch }}-
      - name: Generate collector files
        run: make genotelcontribcol
      - name: Build Collector ${{ matrix.os }} ${{ matrix.arch }}
        run: make GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} otelcontribcol
      - run: ./.github/workflows/scripts/check-disk-space.sh
