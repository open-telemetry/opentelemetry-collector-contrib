name: build-and-test-experimental
# Shadow of every job in build-and-test.yml that fires on a pull_request,
# with the proposed CI improvements layered in. NOT REQUIRED for merging --
# all job names are prefixed `exp-` so they cannot match branch-protection
# rules. Jobs gated to push/tag/main events in the required workflow
# (publish-dev, publish-stable, rotate-milestone, flakytests-generate-issues)
# are intentionally omitted because they never run on PRs.
#
# Scope detection uses compute-ci-scope.sh, adopted from constanca-m's
# proposal in https://github.com/open-telemetry/opentelemetry-collector-contrib/pull/45267
# which does a fixed-point traversal of the Go module graph instead of the
# previous "for-affected-components" + file-count cap heuristic.

on:
  pull_request:
    # `labeled`/`unlabeled` are required so that adding/removing `ci:full` on
    # an open PR retriggers the workflow with the new scope.
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions: read-all

env:
  TEST_RESULTS: testbed/tests/results/junit/results.xml
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  exp-setup-environment:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-check-collector-module-version:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: make genotelcontribcol
      - name: Check Collector Module Version
        run: ./.github/workflows/scripts/check-collector-module-version.sh

  # Runs compute-ci-scope.sh to classify the PR's change set. Outputs a JSON
  # matrix that downstream jobs consume directly as their `group` dimension:
  #   - full mode: ["receiver-0", "receiver-1", ...] (the named groups)
  #   - scoped mode: ["receiver/foo receiver/bar", ...] (bucketed module dirs)
  #   - skip: []
  # The Makefile's FOR_GROUP_TARGET handling treats both formats correctly.
  # `mode` is a derived output (skip / full / scoped) used by cross-compile,
  # which doesn't fit the group-matrix shape.
  exp-ci-scope:
    runs-on: ubuntu-24.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    outputs:
      matrix: ${{ steps.scope.outputs.matrix }}
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Compute scope
        id: scope
        shell: bash
        env:
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET_CONCURRENCY: 10
          FORCE_ALL: ${{ contains(github.event.pull_request.labels.*.name, 'ci:full') }}
          # `^` anchors mean these match files at repo root, not in subdirectories,
          # so a receiver-component Makefile change doesn't trigger the full suite.
          # TEMPORARY (revert before merge): `^.github/workflows/` and `^Makefile`
          # removed so this PR (which necessarily edits both) can exercise the
          # scoped paths on CI for a final validation run.
          CRITICAL_FILES: '[
            "^Makefile.Common",
            "^.golangci.yml",
            "^.github/actions/",
            "^internal/tools/",
            "^versions.yaml",
            "^cmd/otelcontribcol/"
          ]'
          ALL_TEST_GROUPS: '[
            "receiver-0",
            "receiver-1",
            "receiver-2",
            "receiver-3",
            "processor-0",
            "processor-1",
            "exporter-0",
            "exporter-1",
            "exporter-2",
            "exporter-3",
            "extension",
            "connector",
            "internal",
            "pkg",
            "cmd-0",
            "other"
          ]'
        run: ./.github/workflows/scripts/compute-ci-scope.sh
      - name: Derive mode
        id: mode
        shell: bash
        env:
          MATRIX: ${{ steps.scope.outputs.matrix }}
        run: |
          # Scoped runs emit bucketed module paths (contain `/`); full runs emit
          # named groups like "receiver-0" (no slashes). [] is skip.
          if [[ "$MATRIX" == "[]" ]]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
          elif [[ "$MATRIX" == *"/"* ]]; then
            echo "mode=scoped" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
          fi
          echo "Derived mode for matrix: $(cat "$GITHUB_OUTPUT" | tail -1)"

  exp-lint-matrix:
    needs: [exp-setup-environment, exp-ci-scope]
    if: ${{ needs.exp-ci-scope.outputs.matrix != '[]' && needs.exp-ci-scope.outputs.matrix != '' }}
    strategy:
      fail-fast: false
      matrix:
        goos: [windows, linux]
        group: ${{ fromJSON(needs.exp-ci-scope.outputs.matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Lint
        run: GOOS=${{ matrix.goos }} GOARCH=amd64 make -j2 golint GROUP="${{ matrix.group }}"
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-lint:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-lint-matrix]
    steps:
      - name: Interpret result
        env:
          MATRIX_RESULT: ${{ needs.exp-lint-matrix.result }}
        run: |
          if [[ "$MATRIX_RESULT" == "success" || "$MATRIX_RESULT" == "skipped" ]]; then
            echo "Lint passed (result=$MATRIX_RESULT)."
          else
            echo "Lint failed (result=$MATRIX_RESULT)."
            exit 1
          fi

  exp-govulncheck-matrix:
    needs: [exp-setup-environment, exp-ci-scope]
    if: ${{ needs.exp-ci-scope.outputs.matrix != '[]' && needs.exp-ci-scope.outputs.matrix != '' }}
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.exp-ci-scope.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Run govulncheck
        run: make -j2 gogovulncheck GROUP="${{ matrix.group }}"
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-govulncheck:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-govulncheck-matrix]
    steps:
      - name: Interpret result
        env:
          MATRIX_RESULT: ${{ needs.exp-govulncheck-matrix.result }}
        run: |
          if [[ "$MATRIX_RESULT" == "success" || "$MATRIX_RESULT" == "skipped" ]]; then
            echo "govulncheck passed (result=$MATRIX_RESULT)."
          else
            echo "govulncheck failed (result=$MATRIX_RESULT)."
            exit 1
          fi

  # Split the 18 checks/codegen targets across parallel matrix shards. Each
  # shard gets a fresh runner + checkout so the file-modifying targets
  # (goporto, gogci, gotidy, crosslink, generate) don't trample each other
  # inside a single working tree. Wall time is bounded by the slowest shard.
  exp-checks:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    strategy:
      fail-fast: false
      matrix:
        shard:
          - codegen
          - porto-and-gci
          - go-mod-hygiene
          - small-generators
          - schemas-and-templates
          - read-only-checks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - run: make genotelcontribcol
      - name: Run shard ${{ matrix.shard }}
        run: |
          set -euo pipefail
          case "${{ matrix.shard }}" in
            codegen)
              make generate
              if [[ -n $(git status -s) ]]; then
                echo 'Generated code is out of date, please run "make generate" and commit the changes in this PR.'
                exit 1
              fi
              ;;
            porto-and-gci)
              make -j2 goporto
              git diff --exit-code || (echo 'Porto links are out of date, please run "make goporto" and commit the changes in this PR.' && exit 1)
              make gogci
              git diff --exit-code || (echo 'go package imports not formatted, please run "make gogci" and commit the changes in this PR.' && exit 1)
              ;;
            go-mod-hygiene)
              make crosslink
              git diff --exit-code || (echo 'Replace statements are out of date, please run "make crosslink" and commit the changes in this PR.' && exit 1)
              make tidylist
              git diff --exit-code || (echo 'Tidylist is out of date, please run "make tidylist" and commit the changes in this PR.' && exit 1)
              make gotidy
              git diff --exit-code || (echo 'go.mod/go.sum deps changes detected, please run "make gotidy" and commit the changes in this PR.' && exit 1)
              ;;
            small-generators)
              make gendistributions
              git diff -s --exit-code || (echo 'Generated code is out of date, please run "make gendistributions" and commit the changes in this PR.' && exit 1)
              make genlabels
              git diff -s --exit-code || (echo '.github/component_labels.txt is out of date, please run "make genlabels" and commit the changes in this PR.' && exit 1)
              make gencodecov
              git --no-pager diff
              git diff -s --exit-code '.codecov.yml' || (echo '.codecov.yml is out of date, please run "make gencodecov" and commit the changes in this PR.' && exit 1)
              ;;
            schemas-and-templates)
              make generate-gh-issue-templates
              git diff --exit-code '.github/ISSUE_TEMPLATE' || (echo 'Dropdowns in issue templates are out of date, please run "make generate-gh-issue-templates" and commit the changes in this PR.' && exit 1)
              make generate-schemas
              git diff --exit-code '*.schema.yaml' || (echo 'Config schemas are out of date, please run "make generate-schemas" and commit the changes in this PR.' && exit 1)
              make generate-chloggen-components
              git diff --exit-code || (echo '.chloggen/config.yaml is out of date, please run "make generate-chloggen-components" and commit the changes.' && exit 1)
              ;;
            read-only-checks)
              make checkdoc
              make checkmetadata
              make checkapi
              make multimod-verify
              ;;
            *)
              echo "Unknown shard: ${{ matrix.shard }}"
              exit 1
              ;;
          esac
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-unittest-matrix:
    needs: [exp-setup-environment, exp-ci-scope]
    if: ${{ needs.exp-ci-scope.outputs.matrix != '[]' && needs.exp-ci-scope.outputs.matrix != '' }}
    strategy:
      fail-fast: false
      matrix:
        # Experimental fires on PRs only; drop stable Go entirely since the
        # required workflow still runs both versions on push/main.
        go-version: [oldstable]
        runner: [ubuntu-24.04]
        group: ${{ fromJSON(needs.exp-ci-scope.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Test Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/go-build
          key: go-test-build-experimental-${{ runner.os }}-${{ matrix.go-version }}-${{ matrix.runner }}-${{ hashFiles('**/go.sum') }}
      - run: ./.github/workflows/scripts/check-disk-space.sh
      - name: Run Unit Tests
        id: tests
        run: make gotest GROUP="${{ matrix.group }}"
      - name: Fail workflow if tests fails
        if: always()
        run: |
          if [[ "${{ steps.tests.outcome }}" == "failure" ]]; then
            echo "Tests failed. Failing workflow."
            exit 1
          else
            echo "Tests passed or were skipped. Continuing."
          fi

  exp-unittest:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-unittest-matrix]
    steps:
      - name: Interpret result
        env:
          MATRIX_RESULT: ${{ needs.exp-unittest-matrix.result }}
        run: |
          if [[ "$MATRIX_RESULT" == "success" || "$MATRIX_RESULT" == "skipped" ]]; then
            echo "Unit tests passed (result=$MATRIX_RESULT)."
          else
            echo "Unit tests failed (result=$MATRIX_RESULT)."
            exit 1
          fi

  exp-coverage:
    runs-on: ubuntu-24.04
    needs: [exp-unittest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          pattern: coverage-artifacts-*
      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  exp-integration-tests-matrix:
    needs: [exp-setup-environment, exp-ci-scope]
    if: ${{ needs.exp-ci-scope.outputs.matrix != '[]' && needs.exp-ci-scope.outputs.matrix != '' }}
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.exp-ci-scope.outputs.matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Docker images.
        uses: AndreKurait/docker-cache@0fe76702a40db986d9663c24954fc14c6a6031b7 # 0.6.0
        with:
          key: docker-experimental-${{ matrix.group }}
      - name: Run Integration Tests
        run: make gointegration-test GROUP="${{ matrix.group }}"
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-integration-sudo-tests-matrix:
    strategy:
      fail-fast: false
      matrix:
        group:
          - extension/cgroupruntimeextension
          - receiver/icmpcheckreceiver
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Cache Docker images.
        uses: AndreKurait/docker-cache@0fe76702a40db986d9663c24954fc14c6a6031b7 # 0.6.0
        with:
          key: docker-experimental-${{ matrix.group }}
      - name: Run Integration Tests
        run: make --no-print-directory -C ${{ matrix.group }} mod-integration-sudo-test
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-integration-tests:
    if: ${{ github.actor != 'dependabot[bot]' && always() }}
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-integration-tests-matrix, exp-integration-sudo-tests-matrix]
    steps:
      - name: Interpret result
        env:
          MATRIX_RESULT: ${{ needs.exp-integration-tests-matrix.result }}
          SUDO_RESULT: ${{ needs.exp-integration-sudo-tests-matrix.result }}
        run: |
          if [[ "$MATRIX_RESULT" != "success" && "$MATRIX_RESULT" != "skipped" ]]; then
            echo "Integration tests failed (result=$MATRIX_RESULT)."
            exit 1
          fi
          if [[ "$SUDO_RESULT" != "success" && "$SUDO_RESULT" != "skipped" ]]; then
            echo "Integration sudo tests failed (result=$SUDO_RESULT)."
            exit 1
          fi
          echo "Integration tests passed (matrix=$MATRIX_RESULT sudo=$SUDO_RESULT)."

  exp-correctness-traces:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Correctness
        run: make -C testbed run-correctness-traces-tests
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-correctness-metrics:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Correctness
        run: make -C testbed run-correctness-metrics-tests
      - run: ./.github/workflows/scripts/check-disk-space.sh

  exp-build-examples:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
          gomoddownload: "false"
      - run: make genotelcontribcol
      - name: Build Examples
        run: make build-examples
      - run: ./.github/workflows/scripts/check-disk-space.sh

  # Full arch matrix; only runs on mode=full. On scoped PRs,
  # exp-cross-compile-affected handles per-arch verification at the
  # changed-module level instead.
  exp-cross-compile:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-ci-scope]
    if: needs.exp-ci-scope.outputs.mode == 'full'
    strategy:
      fail-fast: false
      matrix:
        os:
          - darwin
          - linux
          - windows
        arch:
          - 386
          - amd64
          - arm
          - arm64
          - ppc64le
          - riscv64
          - s390x
        include:
          - os: linux
            arch: arm
            arm: 7
          - os: aix
            arch: ppc64
        exclude:
          - os: darwin
            arch: 386
          - os: darwin
            arch: arm
          - os: darwin
            arch: ppc64le
          - os: darwin
            arch: riscv64
          - os: darwin
            arch: s390x
          - os: windows
            arch: arm
          - os: windows
            arch: ppc64le
          - os: windows
            arch: riscv64
          - os: windows
            arch: s390x
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Generate collector files
        run: make genotelcontribcol
      - name: Build Collector ${{ matrix.os }} ${{ matrix.arch }} ${{ matrix.arm }}
        run: make GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} GOARM=${{ matrix.arm }} otelcontribcol
      - name: Upload Collector Binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: experimental-collector-binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: ./bin/*
      - run: ./.github/workflows/scripts/check-disk-space.sh

  # Scoped cross-compile: on PRs that only touch a small set of Go sources,
  # verify those modules build for each supported platform without rebuilding
  # the whole otelcontribcol binary. cmd/otelcontribcol/ is in CRITICAL_FILES,
  # so changes to the assembly layer always force mode=full.
  exp-cross-compile-affected:
    runs-on: ubuntu-24.04
    needs: [exp-setup-environment, exp-ci-scope]
    if: needs.exp-ci-scope.outputs.mode == 'scoped'
    strategy:
      fail-fast: false
      matrix:
        os:
          - darwin
          - linux
          - windows
        arch:
          - 386
          - amd64
          - arm
          - arm64
          - ppc64le
          - riscv64
          - s390x
        include:
          - os: linux
            arch: arm
            arm: 7
          - os: aix
            arch: ppc64
        exclude:
          - os: darwin
            arch: 386
          - os: darwin
            arch: arm
          - os: darwin
            arch: ppc64le
          - os: darwin
            arch: riscv64
          - os: darwin
            arch: s390x
          - os: windows
            arch: arm
          - os: windows
            arch: ppc64le
          - os: windows
            arch: riscv64
          - os: windows
            arch: s390x
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go-tools
        with:
          go-version: oldstable
      - name: Build affected modules for ${{ matrix.os }}/${{ matrix.arch }}${{ matrix.arm && format('v{0}', matrix.arm) || '' }}
        env:
          MATRIX: ${{ needs.exp-ci-scope.outputs.matrix }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.arm }}
        run: |
          set -euo pipefail
          # Flatten the bucketed matrix to a unique list of module dirs.
          modules=$(echo "$MATRIX" | jq -r '.[]' | tr ' ' '\n' | sort -u | grep -v '^$')
          for mod in $modules; do
            echo "Building $mod for $GOOS/$GOARCH"
            (cd "$mod" && go build ./...)
          done
      - run: ./.github/workflows/scripts/check-disk-space.sh

  # Only runs in mode=full because exp-cross-compile is the producer of the
  # experimental-collector-binaries-* artifacts this job verifies. On scoped
  # PRs, exp-cross-compile-affected runs `go build ./...` per module and
  # doesn't link the otelcontribcol binary, so there's nothing to verify.
  exp-publish-check:
    runs-on: ubuntu-24.04
    needs: [exp-ci-scope, exp-lint, exp-unittest, exp-integration-tests, exp-cross-compile]
    if: needs.exp-ci-scope.outputs.mode == 'full'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            .github/workflows/scripts/verify-dist-files-exist.sh
      - name: Download Binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          path: ./bin/
          pattern: experimental-collector-binaries-*
      - name: Verify Distribution Files Exist
        id: check
        run: ./.github/workflows/scripts/verify-dist-files-exist.sh
