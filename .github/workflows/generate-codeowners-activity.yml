# This workflow generates a code owner activity report as a GitHub issue.
# It measures whether code owners have reviewed/replied to at least 80% of
# issues and PRs opened against each component (by component label).
#
# When testing from a fork PR: the default token cannot read the upstream repo.
# Add a repo secret UPSTREAM_READ_TOKEN. The token must have read access to
# open-telemetry/opentelemetry-collector-contrib. Use a *classic* PAT with scope
# "repo" (or "public_repo"). Fine-grained PATs must include "Pull requests: Read"
# and "Issues: Read" for that repo; otherwise the API returns 404.

name: 'Generate Code Owner Activity Report'
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print report only, do not create issue)'
        required: false
        default: false
        type: boolean
  schedule:
    # run on the 1st of every month at 2am UTC
    - cron: "0 2 1 * *"
  # Run when this workflow or its script is changed in a PR. Uses dry-run so no issue is created (lets you test without merging to main).
  pull_request:
    paths:
      - '.github/workflows/generate-codeowners-activity.yml'
      - '.github/workflows/scripts/generate-codeowners-activity.js'

permissions:
  contents: read

jobs:
  report:
    permissions:
      contents: read
      issues: write   # create report issue; read for listComments
      pull-requests: read   # list reviews (required for code owner activity report)
    runs-on: ubuntu-24.04
    # Run on upstream (schedule/manual) or on any PR so fork PRs can test; use UPSTREAM_READ_TOKEN when from a fork.
    if: ${{ github.repository_owner == 'open-telemetry' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        id: report
        env:
          # Dry run when manually requested, or when triggered by pull_request (test from a PR without merging to main)
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') || github.event_name == 'pull_request' && 'true' || '0' }}
        with:
          # When running from a fork PR, use a PAT that can read upstream (add UPSTREAM_READ_TOKEN to your fork's repo secrets)
          github-token: ${{ secrets.UPSTREAM_READ_TOKEN || github.token }}
          retries: 3
          script: |
            const script = require('.github/workflows/scripts/generate-codeowners-activity.js')
            await script({github, context})
