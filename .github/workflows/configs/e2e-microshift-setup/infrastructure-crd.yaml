# Minimal Infrastructure CRD for MicroShift CI environments.
# MicroShift does not ship the config.openshift.io API group, so we install
# only the subset needed by the OpenShift resource-detection processor.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: infrastructures.config.openshift.io
spec:
  group: config.openshift.io
  names:
    kind: Infrastructure
    listKind: InfrastructureList
    plural: infrastructures
    singular: infrastructure
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
            status:
              type: object
              properties:
                infrastructureName:
                  type: string
                controlPlaneTopology:
                  type: string
                infrastructureTopology:
                  type: string
                platformStatus:
                  type: object
                  properties:
                    type:
                      type: string
                    aws:
                      type: object
                      properties:
                        region:
                          type: string
                    azure:
                      type: object
                      properties:
                        cloudName:
                          type: string
                    gcp:
                      type: object
                      properties:
                        region:
                          type: string
                    ibmcloud:
                      type: object
                      properties:
                        location:
                          type: string
                    openstack:
                      type: object
                      properties:
                        cloudName:
                          type: string
