name: "Update contrib to the latest core source"
on:
  workflow_dispatch:
  schedule:
    - cron: "27 8 * * 5" # Run at 08:27 UTC on Fridays.

permissions:
  contents: read

jobs:
  update-otel:
    permissions:
      contents: write # required for pushing changes
      issues: write # required for creating failure issues
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'open-telemetry' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: opentelemetry-collector-contrib
      - name: Pull the latest collector repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: opentelemetry-collector
          repository: open-telemetry/opentelemetry-collector
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
      - name: Prepare to update dependencies
        run: |
          exec > >(tee log.out) 2>&1
          LAST_COMMIT="$(git -C ./opentelemetry-collector/ rev-parse HEAD)"
          cd opentelemetry-collector-contrib
          git config user.name otelbot
          git config user.email 197425009+otelbot@users.noreply.github.com
          branch="otelbot/update-otel-$(date +%s)"
          git checkout -b "$branch"
          make genotelcontribcol
          # Extract current collector version from API
          CURRENT_VERSION="$(gh api repos/open-telemetry/opentelemetry-collector/releases/latest --jq '.tag_name')"
          {
            echo "CURRENT_VERSION=$CURRENT_VERSION"
            echo "LAST_COMMIT=$LAST_COMMIT"
            echo "BRANCH_NAME=$branch"
          } >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
      - name: Gets packages from links with retries
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          retry_wait_seconds: 1800
          timeout_minutes: 120
          max_attempts: 2
          retry_on: error
          command: |
            exec > >(tee -a log.out) 2>&1
            cd opentelemetry-collector-contrib
            make update-otel OTEL_STABLE_VERSION=${{ env.LAST_COMMIT }} OTEL_VERSION=${{ env.LAST_COMMIT }}
      - name: Push and create PR
        run: |
          exec > >(tee -a log.out) 2>&1
          cd opentelemetry-collector-contrib
          git push --set-upstream origin ${{ env.BRANCH_NAME }}
          gh pr create --base main --title "[chore] Update core dependencies" --body "$(cat <<'EOF'
          This PR updates the opentelemetry-collector dependencies to open-telemetry/opentelemetry-collector@${{ env.LAST_COMMIT }}.

          Changes included in this PR: https://github.com/open-telemetry/opentelemetry-collector/compare/${{ env.CURRENT_VERSION }}...${{ env.LAST_COMMIT }}
          EOF
          )" --draft
        env:
          GITHUB_TOKEN: ${{ steps.otelbot-token.outputs.token }}
      - name: File an issue if the workflow failed
        id: file-issue
        if: failure()
        run: |
          job_url="$(gh run view ${{ github.run_id }} -R ${{ github.repository }} --json jobs -q '.jobs[] | select(.name == "update-otel") | .url')"
          body="$(printf '[Link to job log](%s)

          <details>
          <summary>Last 100 lines of log</summary>

          ```
          %s
          ```
          </details>' "$job_url" "$(tail -n100 log.out | tail -c63K)")"
          issue_url="$(gh issue create -R ${{ github.repository }} -t 'update-otel workflow failed' -b "$body" -l 'ci-cd')"
          {
            echo "job_url=$job_url"
            echo "issue_url=$issue_url"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Post to Slack if the workflow failed
        if: failure()
        continue-on-error: true
        run: |
          set -euo pipefail
          payload=$(jq -n \
            --arg run_url "${RUN_URL}" \
            --arg issue_url "${ISSUE_URL}" \
            '{run_url: $run_url, issue_url: $issue_url}')
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data-binary "${payload}" "${SLACK_WEBHOOK_URL}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_UPDATE_OTEL_FAILURE }}
          RUN_URL: ${{ steps.file-issue.outputs.job_url }}
          ISSUE_URL: ${{ steps.file-issue.outputs.issue_url }}
