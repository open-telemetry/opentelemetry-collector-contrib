$defs:
  config:
    type: object
    properties:
      api_version:
        description: Docker client API version. If empty, the client will auto-negotiate the API version with the Docker daemon using version negotiation.
        type: string
      endpoint:
        description: The URL of the docker server. Default is "unix:///var/run/docker.sock" on non-Windows and "npipe:////./pipe/docker_engine" on Windows
        type: string
      excluded_images:
        description: A list of filters whose matching images are to be excluded. Supports literals, globs, and regex.
        type: array
        items:
          type: string
      stream_stats:
        description: StreamStats enables a persistent streaming connection per container to collect stats. When true, each container maintains an open Docker stats stream and the scraper reads from the cached latest value, which reduces connection overhead.  When false (default), a new connection is opened and closed on every scrape cycle, matching the original behavior.
        type: boolean
      timeout:
        description: The maximum amount of time to wait for docker API responses. Default is 5s
        type: string
        format: duration
      tls:
        description: TLS holds optional TLS client configuration for connecting to the Docker daemon over HTTPS. When nil (the default), the connection uses no custom TLS — suitable for Unix sockets and plain HTTP endpoints.
        x-optional: true
        $ref: go.opentelemetry.io/collector/config/configtls.client_config
