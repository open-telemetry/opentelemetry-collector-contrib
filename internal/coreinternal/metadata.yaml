type: coreinternal

status:
  disable_codecov_badge: true
  stability:
    alpha: [logs, metrics, traces, profiles]
  codeowners:
    active: [open-telemetry/collector-approvers]
  class: pkg

feature_gates:
  - id: internal.coreinternal.goldendataset.DontEmitV0HTTPConventions
    stage: beta
    description: >-
      When enabled, goldendataset no longer generates spans with deprecated
      semconv HTTP attribute http.flavor (semconv v1.19.0).
    from_version: v0.152.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45294
  - id: internal.coreinternal.goldendataset.DontEmitV0MessagingConventions
    stage: beta
    description: >-
      When enabled, goldendataset no longer generates spans with deprecated
      semconv messaging attributes messaging.destination and
      messaging.destination.kind.
    from_version: v0.152.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45294
  - id: internal.coreinternal.goldendataset.DontEmitV0NetworkConventions
    stage: beta
    description: >-
      When enabled, goldendataset no longer generates spans with deprecated
      semconv v1.12.0 attributes (net.host.ip, net.peer.ip, http.host, http.server_name).
    from_version: v0.147.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45076
    skip_strict_validation: true
  - id: internal.coreinternal.goldendataset.DontEmitV0RPCConventions
    stage: beta
    description: >-
      When enabled, goldendataset no longer generates spans with deprecated
      semconv RPC attributes rpc.service and peer.service.
    from_version: v0.148.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/47548
    skip_strict_validation: true
  - id: internal.coreinternal.goldendataset.EmitV1HTTPConventions
    stage: beta
    description: >-
      When enabled, goldendataset generates spans with network.protocol.version
      (semconv v1.40.0) alongside legacy http.flavor (semconv v1.19.0) to
      support migration.
    from_version: v0.152.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45294
  - id: internal.coreinternal.goldendataset.EmitV1MessagingConventions
    stage: beta
    description: >-
      When enabled, goldendataset generates spans with messaging.destination.name
      (semconv v1.40.0) alongside legacy messaging.destination and
      messaging.destination.kind to support migration.
    from_version: v0.152.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45294
  - id: internal.coreinternal.goldendataset.EmitV1NetworkConventions
    stage: beta
    description: >-
      When enabled, goldendataset generates spans with network.local.address,
      network.peer.address, and server.address (semconv v1.38.0) instead of
      the deprecated net.host.ip, net.peer.ip, http.host, http.server_name
      (semconv v1.12.0). Enable together with
      pkg.translator.zipkin.EmitV1NetworkConventions for consistent round-trip
      translation in tests.
    from_version: v0.147.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45076
    skip_strict_validation: true
  - id: internal.coreinternal.goldendataset.EmitV1RPCConventions
    stage: beta
    description: >-
      When enabled, goldendataset generates spans with rpc.method and
      service.peer.name (semconv v1.40.0) alongside legacy rpc.service and
      peer.service to support migration.
    from_version: v0.148.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/47548
    skip_strict_validation: true
