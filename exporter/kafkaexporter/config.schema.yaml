$defs:
  record_partitioner_config:
    description: RecordPartitionerConfig configures the strategy used to assign Kafka records to partitions. At most one field should be set.
    type: object
    properties:
      extension:
        description: Extension is the component ID of an extension implementing RecordPartitionerExtension. Setting this field delegates partition assignment to that extension.
        x-pointer: true
        type: string
        x-customType: go.opentelemetry.io/collector/component.ID
      least_backup:
        description: LeastBackup routes each record to the partition with the fewest buffered records.
        x-pointer: true
        type: object
      round_robin:
        description: RoundRobin distributes records evenly across all available partitions in round-robin order.
        x-pointer: true
        type: object
      sticky_key:
        description: StickyKey uses StickyKeyPartitioner. When a record key is set, the partition is derived from the key hash.
        x-pointer: true
        $ref: sticky_key_partitioner_config
  signal_config:
    description: SignalConfig holds signal-specific configuration for the Kafka exporter.
    type: object
    properties:
      encoding:
        description: Encoding holds the encoding of messages for the signal type. Defaults to "otlp_proto".
        type: string
      topic:
        description: 'Topic holds the name of the Kafka topic to which messages of the signal type should be produced. The default depends on the signal type: - "otlp_spans" for traces - "otlp_metrics" for metrics - "otlp_logs" for logs - "otlp_profiles" for profiles'
        type: string
      topic_from_metadata_key:
        description: TopicFromMetadataKey holds the name of the metadata key to use as the topic name for this signal type. If this is set, it takes precedence over the topic name set in the topic field.
        type: string
  sticky_key_partitioner_config:
    description: StickyKeyPartitionerConfig configures the StickyKeyPartitioner.
    type: object
    properties:
      hasher:
        description: 'Hasher is the hash algorithm used for key-based partition assignment. Valid values: "sarama_compat" (default). - "sarama_compat": Sarama-compatible FNV-1a hashing (SaramaCompatHasher). - "murmur2": Murmur2 hashing.'
        type: string
description: Config defines configuration for Kafka exporter.
type: object
properties:
  include_metadata_keys:
    description: IncludeMetadataKeys indicates the receiver's client metadata keys to propagate as Kafka message headers.
    type: array
    items:
      type: string
  logs:
    description: Logs holds configuration about how logs should be sent to Kafka.
    $ref: signal_config
  metrics:
    description: Metrics holds configuration about how metrics should be sent to Kafka.
    $ref: signal_config
  partition_logs_by_resource_attributes:
    description: PartitionLogsByResourceAttributes controls the partitioning of logs messages by resource. If this is true, then the message key will be set to a hash of the resource's identifying attributes.
    type: boolean
  partition_logs_by_trace_id:
    description: PartitionLogsByTraceID controls partitioning of log messages by trace ID only. When enabled, the exporter splits incoming logs per TraceID (using SplitLogs) and sets the Kafka message key to the 16-byte hex string of that TraceID. If a LogRecord has an empty TraceID, the key may be empty and partition selection falls back to the Kafka client’s default strategy. Resource attributes are not used for the key when this option is enabled.
    type: boolean
  partition_metrics_by_resource_attributes:
    description: PartitionMetricsByResourceAttributes controls the partitioning of metrics messages by resource. If this is true, then the message key will be set to a hash of the resource's identifying attributes.
    type: boolean
  partition_traces_by_id:
    description: 'PartitionTracesByID sets the message key of outgoing trace messages to the trace ID. NOTE: this does not have any effect for Jaeger encodings. Jaeger encodings always use use the trace ID for the message key.'
    type: boolean
  producer:
    $ref: /pkg/kafka/configkafka.producer_config
  profiles:
    description: Profiles holds configuration about how profiles should be sent to Kafka.
    $ref: signal_config
  record_partitioner:
    description: RecordPartitioner configures how Kafka records are assigned to partitions. The default ("sarama_compatible") retains the legacy Sarama-compatible hashing behavior. Set to "sticky", "round_robin", or "least_backup" to use one of the built-in franz-go partitioners, or "extension" to delegate to a custom extension.
    $ref: record_partitioner_config
  sending_queue:
    x-optional: true
    $ref: go.opentelemetry.io/collector/exporter/exporterhelper.queue_batch_config
  topic_from_attribute:
    description: TopicFromAttribute is the name of the attribute to use as the topic name.
    type: string
  traces:
    description: Traces holds configuration about how traces should be sent to Kafka.
    $ref: signal_config
allOf:
  - $ref: go.opentelemetry.io/collector/exporter/exporterhelper.timeout_config
  - $ref: go.opentelemetry.io/collector/config/configretry.back_off_config
  - $ref: /pkg/kafka/configkafka.client_config
