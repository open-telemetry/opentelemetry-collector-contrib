kafka:
  logs:
    topic: spans
  metrics:
    topic: spans
  traces:
    topic: spans
  profiles:
    topic: spans
  brokers:
    - "foo:123"
    - "bar:456"
  producer:
    max_message_bytes: 10000000
    required_acks: -1 # WaitForAll
  timeout: 10s
  partition_traces_by_id: true
  partition_metrics_by_resource_attributes: true
  partition_logs_by_resource_attributes: true
  sending_queue:
    enabled: true
    num_consumers: 2
    queue_size: 10
  retry_on_failure:
    enabled: true
    initial_interval: 10s
    max_interval: 60s
    max_elapsed_time: 10m
kafka/per_signal_topic:
  include_metadata_keys:
    - metadata_key
  logs:
    topic: per_signal_topic
    topic_from_metadata_key: metadata_key
  metrics:
    topic: metrics_topic
  traces:
    topic: per_signal_topic
  profiles:
    topic: per_signal_topic
kafka/per_signal_encoding:
  logs:
    encoding: per_signal_encoding
  metrics:
    encoding: metrics_encoding
  traces:
    encoding: per_signal_encoding
  profiles:
    encoding: per_signal_encoding
kafka/metadata_batch_valid:
  include_metadata_keys:
    - metadata_key
  sending_queue:
    enabled: true
    batch:
      sizer: bytes
      partition:
        metadata_keys:
          - metadata_key
          - another_key
