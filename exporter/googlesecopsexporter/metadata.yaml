type: google_secops

status:
  class: exporter
  stability:
    development: [logs]
  codeowners:
    active: [braydonk, colelaven, dpaasman00, mrsillydog]

telemetry:
  metrics:
    google_secops.exporter.bytes.sent:
      enabled: true
      description: The total number of raw bytes sent.
      stability: alpha
      unit: By
      sum:
        value_type: int
        monotonic: true
        aggregation_temporality: cumulative

    google_secops.exporter.payload.size:
      enabled: true
      description: "The size of the payload in bytes."
      stability: alpha
      unit: By
      histogram:
        value_type: int
        bucket_boundaries: [10000, 50000, 100000, 250000, 500000, 750000, 1e6, 1.25e6, 1.5e6, 1.75e6, 2e6, 2.25e6, 2.5e6, 2.75e6, 3e6, 3.25e6, 3.5e6, 3.75e6, 4e6, 4.25e6, 4.5e6, 4.75e6, 5e6]

    google_secops.exporter.request.count:
      enabled: true
      description: "The total number of requests made."
      stability: alpha
      unit: "{request}"
      sum:
        value_type: int
        monotonic: true
        aggregation_temporality: cumulative

    google_secops.exporter.request.latency:
      enabled: true
      description: "The latency of the request in milliseconds."
      stability: alpha
      unit: ms
      histogram:
        value_type: int
        bucket_boundaries: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 1500, 2000, 2500, 3000, 3500, 4000, 4500, 5000, 10000, 15000, 20000, 30000, 60000]

tests:
  config:
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 300s
      max_interval: 30s
    sending_queue:
      enabled: false
    timeout: 1m30s
