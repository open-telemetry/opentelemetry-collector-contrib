$defs:
  resource_attrs_to_gcs:
    description: ResourceAttrsToGCS maps GCS upload configuration values to resource attribute values.
    type: object
    properties:
      prefix:
        description: Prefix names the resource attribute whose value (from the first resource of each batch) is inserted as a partition segment between bucket.partition.prefix and the time format, e.g. prefix "storage" + attribute "serviceA" -> "storage/serviceA/<time>/...".
        type: string
type: object
properties:
  bucket:
    type: object
    properties:
      compression:
        description: 'Compression sets the algorithm used to process the payload before uploading to GCS. Valid values are: `gzip`, `zstd`, or no value set.'
        $ref: go.opentelemetry.io/collector/config/configcompression.type
      file_prefix:
        description: 'FilePrefix holds the prefix for the created filename. This prefix is applied after the partition path (if any). Example: file_prefix: "logs" Result: ".../logs_UUID"'
        type: string
      name:
        description: Name for the bucket storage.
        type: string
      partition:
        description: Partition configures the time-based partition format and file prefix.
        type: object
        properties:
          format:
            description: 'Format is a time format string used to create time-based partitions. If set, the current UTC time formatted with this string will be prepended to the filename. You can use standard strftime format parameters (e.g., %Y, %m, %d, %H, %M, %S). Example: "year=%Y/month=%m/day=%d" would result in "year=2023/month=10/day=25/"'
            type: string
          prefix:
            description: 'Prefix holds the prefix for the partition path. This prefix is applied before the time-based partition structure. Example: prefix: "archive" Result: "archive/year=2023/..."'
            type: string
      project_id:
        description: ProjectID defines the project where the bucket will be created or where it exists. If it is left empty, it will query the metadata endpoint. It requires the collector to be running in a Google Cloud environment.
        type: string
      region:
        description: Region where bucket will be created or where it exists. If it is left empty, it will query the metadata endpoint. It requires the collector to be running in a Google Cloud environment.
        type: string
      reuse_if_exists:
        description: 'ReuseIfExists controls whether to reuse an existing bucket or create a new one. When set to true: - The exporter checks if the bucket exists (requires storage.buckets.get on the bucket) - If the bucket exists, it will be used - If the bucket does not exist, an error is returned When set to false: - The exporter attempts to create the bucket (requires storage.buckets.create at project level) - If the bucket already exists, an error is returned Set to true when the service account lacks project-level bucket creation permissions but has bucket-level permissions.'
        type: boolean
  encoding:
    x-pointer: true
    type: string
    x-customType: go.opentelemetry.io/collector/component.ID
  resource_attrs_to_gcs:
    description: ResourceAttrsToGCS maps GCS upload configuration values to resource attribute values.
    $ref: resource_attrs_to_gcs
  retry_on_failure:
    $ref: go.opentelemetry.io/collector/config/configretry.back_off_config
  sending_queue:
    x-optional: true
    $ref: go.opentelemetry.io/collector/exporter/exporterhelper.queue_batch_config
  universe_domain:
    description: UniverseDomain is the universe domain for the Google Cloud Storage service. Defaults to "googleapis.com". Set to support Sovereign Cloud regions. See https://pkg.go.dev/google.golang.org/api/option#WithUniverseDomain
    type: string
allOf:
  - $ref: go.opentelemetry.io/collector/exporter/exporterhelper.timeout_config
