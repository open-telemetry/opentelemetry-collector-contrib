receivers:
  nop:

processors:

exporters:
  load_balancing:
    protocol:
      otlp:
        endpoint: should-be-replaced:4317

    resolver:
      static:
        hostnames:
        - endpoint-1
service:
  pipelines:
    traces:
      receivers:
      - nop
      processors: []
      exporters:
      - load_balancing
    logs:
      receivers:
        - nop
      processors: []
      exporters:
        - load_balancing
