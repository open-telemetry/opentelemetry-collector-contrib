loadbalancing:
  protocol:
    # the OTLP exporter configuration "endpoint" values will be ignored
    otlp:
      timeout: 1s

  # how to get the list of backends: static
  resolver:
    static:
      hostnames:
      - endpoint-1 # assumes 4317 as the default port
      - endpoint-2:55678
loadbalancing/2:
  protocol:
    otlp:

  # how to get the list of backends: DNS
  resolver:
    dns:
      hostname: service-1 # assumes 4317 as the default port for the resolved IP addresses
loadbalancing/3:
  protocol:
    otlp:

  # how to get the list of backends: DNS
  resolver:
    dns:
      hostname: service-1
      port: 55690

loadbalancing/4:
  protocol:
    otlp:

  # how to get the list of backends: DNS
  resolver:
    aws_cloud_map:
      namespace: cloudmap-1
      service_name: service-1
      port: 4319

loadbalancing/5:
  # the OTLP exporter configuration "sending_queue" values will be ignored
  sending_queue:
    enabled: true
  protocol:
    otlp:
      sending_queue:
        enabled: false
loadbalancing/6:
  endpoint_health:
    enabled: true
    quarantine_duration: 30s
    reroute_on_failure: true
    max_reroute_attempts: 1
  protocol:
    otlp:
      timeout: 3s
  resolver:
    dns:
      hostname: service-1
      interval: 1s
      timeout: 1s
loadbalancing/7:
  log_routing:
    ignore_trace_id: true
  protocol:
    otlp:
      timeout: 1s
  resolver:
    static:
      hostnames:
        - endpoint-1
        - endpoint-2:55678
