    type: "workload_identity"
    client_id: "e4b5a5f0-3d6a-4b1c-9e2f-7c8a1b8f2c3d"
    tenant_id: "e4b5a5f0-3d6a-4b1c-9e2f-7c8a1b8f2c3d"
    federated_token_file: "/path/to/federated/token/file"
