type: googlecloud
display_name: Google Cloud Exporter

status:
  class: exporter
  stability:
    beta: [traces, metrics, logs]
  distributions: [contrib]
  codeowners:
    active: [aabmass, dashpole, braydonk, jsuereth, psx95, ridwanmsharif]

feature_gates:
  - id: exporter.googlecloud.CustomMonitoredResources
    description: >-
      When enabled, the googlecloudexporter will map the OTLP metrics to the monitored resource type
      defined by the resource label gcp.resource_type. The MR labels are defined by resource labels
      with the prefix gcp.<monitored_resource_type>.
    stage: alpha
    from_version: "v0.122.0"
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/pull/38331

tests:
  skip_lifecycle: true
  goleak:
    ignore:
      top:
        # See https://github.com/census-instrumentation/opencensus-go/issues/1191 for more information.
        - "go.opencensus.io/stats/view.(*worker).start"
