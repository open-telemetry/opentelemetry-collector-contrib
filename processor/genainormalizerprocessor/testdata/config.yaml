# Full config exercising the supported source and its per-source fields.
gen_ai_normalizer:
  sources:
    - name: openinference
      remove_originals: true
      overwrite: false

# Sources omitted entirely: validation error (at least one source required).
gen_ai_normalizer/empty:

# Sources with only openinference defaults.
gen_ai_normalizer/openinference_only:
  sources:
    - name: openinference

# Sources with only openllmetry defaults.
gen_ai_normalizer/openllmetry_only:
  sources:
    - name: openllmetry

# Both sources, applied in listed order.
gen_ai_normalizer/openinference_and_openllmetry:
  sources:
    - name: openinference
      remove_originals: true
    - name: openllmetry
      remove_originals: true

# Explicit empty sources list: validation error.
gen_ai_normalizer/empty_sources:
  sources: []

# Unknown source name: validation error.
gen_ai_normalizer/unknown_source:
  sources:
    - name: foobar

# Same source listed twice: validation error.
gen_ai_normalizer/duplicate_source:
  sources:
    - name: openinference
    - name: openinference

# Single custom source with two mappings.
gen_ai_normalizer/custom_only:
  sources:
    - name: custom
      remove_originals: true
      mappings:
        my_vendor.model: gen_ai.request.model
        my_vendor.tokens.in: gen_ai.usage.input_tokens

# Built-in source followed by a custom source.
gen_ai_normalizer/custom_with_builtin:
  sources:
    - name: openinference
      remove_originals: true
    - name: custom
      remove_originals: true
      mappings:
        my_vendor.model: gen_ai.request.model

# Two custom blocks in one config: allowed; built-in sources still
# reject duplicates.
gen_ai_normalizer/multiple_custom:
  sources:
    - name: custom
      remove_originals: true
      mappings:
        vendor_a.model: gen_ai.request.model
    - name: custom
      remove_originals: true
      overwrite: true
      mappings:
        vendor_b.model: gen_ai.request.model

# Custom source with empty mappings: validation error.
gen_ai_normalizer/custom_empty_mappings:
  sources:
    - name: custom

# Built-in source with mappings set: validation error
# (mappings is custom-only).
gen_ai_normalizer/openinference_with_mappings:
  sources:
    - name: openinference
      mappings:
        foo: gen_ai.request.model

# Custom source with a value_mappings key that is not a target
# in mappings: validation error (the rule would never fire).
gen_ai_normalizer/custom_unreachable_value_mapping:
  sources:
    - name: custom
      mappings:
        my_vendor.model: gen_ai.request.model
      value_mappings:
        gen_ai.operation.name:
          chat_completion: chat

# Custom source with mappings + value_mappings folding onto an OTel
# GenAI enum target.
gen_ai_normalizer/custom_with_value_mappings:
  sources:
    - name: custom
      remove_originals: true
      mappings:
        my_vendor.op: gen_ai.operation.name
      value_mappings:
        gen_ai.operation.name:
          chat_completion: chat
          tool_invoke: execute_tool
