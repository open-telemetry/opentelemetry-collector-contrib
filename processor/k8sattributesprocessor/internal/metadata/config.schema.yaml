$defs:
  resource_attribute_config:
    description: ResourceAttributeConfig provides common config for a particular resource attribute.
    type: object
    properties:
      enabled:
        type: boolean
  resource_attributes_config:
    description: ResourceAttributesConfig provides config for k8s_attributes resource attributes.
    type: object
    properties:
      container.id:
        $ref: resource_attribute_config
      container.image.name:
        $ref: resource_attribute_config
      container.image.repo_digests:
        $ref: resource_attribute_config
      container.image.tag:
        $ref: resource_attribute_config
      container.image.tags:
        $ref: resource_attribute_config
      k8s.cluster.uid:
        $ref: resource_attribute_config
      k8s.container.name:
        $ref: resource_attribute_config
      k8s.cronjob.name:
        $ref: resource_attribute_config
      k8s.cronjob.uid:
        $ref: resource_attribute_config
      k8s.daemonset.name:
        $ref: resource_attribute_config
      k8s.daemonset.uid:
        $ref: resource_attribute_config
      k8s.deployment.name:
        $ref: resource_attribute_config
      k8s.deployment.uid:
        $ref: resource_attribute_config
      k8s.job.name:
        $ref: resource_attribute_config
      k8s.job.uid:
        $ref: resource_attribute_config
      k8s.namespace.name:
        $ref: resource_attribute_config
      k8s.node.name:
        $ref: resource_attribute_config
      k8s.node.uid:
        $ref: resource_attribute_config
      k8s.pod.hostname:
        $ref: resource_attribute_config
      k8s.pod.ip:
        $ref: resource_attribute_config
      k8s.pod.name:
        $ref: resource_attribute_config
      k8s.pod.start_time:
        $ref: resource_attribute_config
      k8s.pod.uid:
        $ref: resource_attribute_config
      k8s.replicaset.name:
        $ref: resource_attribute_config
      k8s.replicaset.uid:
        $ref: resource_attribute_config
      k8s.statefulset.name:
        $ref: resource_attribute_config
      k8s.statefulset.uid:
        $ref: resource_attribute_config
      service.instance.id:
        $ref: resource_attribute_config
      service.name:
        $ref: resource_attribute_config
      service.namespace:
        $ref: resource_attribute_config
      service.version:
        $ref: resource_attribute_config
