resource_detection:
resource_detection/openshift:
  detectors: [openshift]
  timeout: 2s
  override: false
  openshift:
    address: "127.0.0.1:4444"
    token: "some_token"
    tls:
      insecure: true

resource_detection/aks:
  detectors: [env, aks]
  timeout: 2s
  override: false

resource_detection/gcp:
  detectors: [env, gcp]
  timeout: 2s
  override: false

resource_detection/ec2:
  detectors: [env, ec2]
  timeout: 2s
  override: false
  ec2:
    tags:
      - ^tag1$
      - ^tag2$

resource_detection/ecs:
  detectors: [env, ecs]
  timeout: 2s
  override: false

resource_detection/lambda:
  detectors: [env, lambda]
  timeout: 2s
  override: false

resource_detection/system:
  detectors: [env, system]
  timeout: 2s
  override: false
  system:
    hostname_sources: [os]

resource_detection/docker:
  detectors: [env, docker]
  timeout: 2s
  override: false

resource_detection/azure:
  detectors: [env, azure]
  timeout: 2s
  override: false

resource_detection/heroku:
  detectors: [env, heroku]
  timeout: 2s
  override: false

resource_detection/refresh:
  detectors: [system]
  timeout: 2s
  override: false
  refresh_interval: 5s

resource_detection/invalid:
  detectors: [env, system]
  timeout: 2s
  override: false
  system:
    hostname_sources: [invalid_source]

resource_detection/resourceattributes:
  detectors: [system, ec2]
  timeout: 2s
  override: false
  ec2:
    resource_attributes:
      host.name:
        enabled: false
      host.id:
        enabled: false
      host.type:
        enabled: false
  system:
    resource_attributes:
      os.type:
        enabled: false
