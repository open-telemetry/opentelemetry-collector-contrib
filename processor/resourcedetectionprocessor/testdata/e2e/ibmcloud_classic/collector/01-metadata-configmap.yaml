apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Name }}-metadata-config
  namespace: default
data:
  server.py: |
    import os
    import ssl
    from http.server import BaseHTTPRequestHandler, HTTPServer

    # IBM Cloud Classic (SoftLayer) Resource Metadata
    # All values returned as plain text (using .txt format)
    METADATA = {
        "/rest/v3.1/SoftLayer_Resource_Metadata/getId.txt": "156800198",
        "/rest/v3.1/SoftLayer_Resource_Metadata/getHostname.txt": "test-classic-instance",
        "/rest/v3.1/SoftLayer_Resource_Metadata/getDatacenter.txt": "dal10",
        "/rest/v3.1/SoftLayer_Resource_Metadata/getAccountId.txt": "3186058",
        "/rest/v3.1/SoftLayer_Resource_Metadata/getGlobalIdentifier.txt": "06220b70-9072-4f83-ba16-d62f03106c1c",
    }

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            # Health check endpoint (plain HTTP check on /healthz)
            if self.path == "/healthz":
                body = b"ok"
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                _ = self.wfile.write(body)
                return

            # SoftLayer metadata endpoints
            if self.path in METADATA:
                body = METADATA[self.path].encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                _ = self.wfile.write(body)
                return

            # Not found
            self.send_response(404)
            self.end_headers()

        def log_message(self, fmt, *args):
            return

    if __name__ == "__main__":
        cert_file = os.environ.get("TLS_CERT_FILE", "/certs/tls.crt")
        key_file = os.environ.get("TLS_KEY_FILE", "/certs/tls.key")
        port = int(os.environ.get("PORT", "443"))
        httpd = HTTPServer(("", port), Handler)
        context = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
        context.load_cert_chain(certfile=cert_file, keyfile=key_file)
        httpd.socket = context.wrap_socket(httpd.socket, server_side=True)
        httpd.serve_forever()
