apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Name }}
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Name }}
  template:
    metadata:
      labels:
        app: {{ .Name }}
    spec:
      serviceAccountName: {{ .Name }}-sa
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "api.service.softlayer.com"
      initContainers:
        - name: cert-gen
          image: alpine/openssl:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
                -keyout /certs/ca.key -out /certs/ca.crt \
                -subj "/CN=fake-classic-ca"
              openssl req -newkey rsa:2048 -nodes \
                -keyout /certs/tls.key -out /certs/tls.csr \
                -subj "/CN=api.service.softlayer.com"
              openssl x509 -req -in /certs/tls.csr \
                -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
                -out /certs/tls.crt -days 1 \
                -extfile <(printf "subjectAltName=DNS:api.service.softlayer.com,DNS:localhost")
          volumeMounts:
            - name: certs
              mountPath: /certs
        - name: metadata-server
          image: python:3.13-alpine
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          securityContext:
            runAsUser: 0
            capabilities:
              drop:
                - "ALL"
              add:
                - "NET_BIND_SERVICE"
          command:
            - python3
            - /scripts/server.py
          env:
            - name: TLS_CERT_FILE
              value: /certs/tls.crt
            - name: TLS_KEY_FILE
              value: /certs/tls.key
            - name: PORT
              value: "443"
          ports:
            - containerPort: 443
              name: https
          startupProbe:
            httpGet:
              path: /healthz
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 2
            periodSeconds: 1
            failureThreshold: 30
          volumeMounts:
            - name: metadata-script
              mountPath: /scripts
            - name: certs
              mountPath: /certs
      containers:
        - name: otelcol
          image: otelcontribcol:latest
          imagePullPolicy: Never
          env:
            - name: SSL_CERT_FILE
              value: /certs/ca.crt
          args:
            - "--config=/conf/relay"
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ .Name }}-config
            items:
              - key: relay
                path: relay
        - name: metadata-script
          configMap:
            name: {{ .Name }}-metadata-config
        - name: certs
          emptyDir: {}
