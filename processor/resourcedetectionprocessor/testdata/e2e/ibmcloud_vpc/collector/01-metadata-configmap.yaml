apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Name }}-metadata-config
  namespace: default
data:
  server.py: |
    import json
    import os
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse, parse_qs

    # IBM Cloud VPC Instance Metadata
    IBM_INSTANCE_METADATA = {
        "id": "0717_1e09281b-f177-46fb-b1f1-bc152b2e391a",
        "crn": "crn:v1:bluemix:public:is:us-south-1:a/123456789012::instance:0717_1e09281b-f177-46fb-b1f1-bc152b2e391a",
        "name": "test-ibmcloud-instance",
        "profile": {
            "name": "bx2-2x8"
        },
        "zone": {
            "name": "us-south-1"
        },
        "vpc": {
            "id": "r006-4727d842-f94f-4a2d-824a-9bc9b02c523b",
            "crn": "crn:v1:bluemix:public:is:us-south:a/123456789012::vpc:r006-4727d842-f94f-4a2d-824a-9bc9b02c523b",
            "name": "test-vpc"
        },
        "resource_group": {
            "id": "fee82deba12e4c0fb69c3b09d1f12345"
        },
        "image": {
            "id": "r006-ed3f775f-ad7e-4e37-ae62-7199b4988b00",
            "name": "ibm-ubuntu-22-04-4-minimal-amd64-3"
        }
    }

    # Token to return (static for testing)
    TOKEN_RESPONSE = {
        "access_token": "test-instance-identity-token",
        "created_at": "2025-04-22T12:00:00Z",
        "expires_at": "2025-04-22T12:05:00Z",
        "expires_in": 300
    }

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            parsed = urlparse(self.path)
            path = parsed.path

            # Health check endpoint
            if path == "/healthz":
                body = b"ok"
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            # Instance metadata endpoint
            if path == "/metadata/v1/instance":
                auth = self.headers.get("Authorization", "")
                if not auth.startswith("Bearer "):
                    self.send_response(401)
                    self.send_header("Content-Type", "text/plain")
                    self.end_headers()
                    self.wfile.write(b"Missing or invalid Authorization header")
                    return

                body = json.dumps(IBM_INSTANCE_METADATA).encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "application/json; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            # Not found
            self.send_response(404)
            self.end_headers()

        def do_PUT(self):
            parsed = urlparse(self.path)
            path = parsed.path

            # Token endpoint
            if path == "/identity/v1/token":
                flavor = self.headers.get("Metadata-Flavor", "")
                if flavor != "ibm":
                    self.send_response(400)
                    self.send_header("Content-Type", "text/plain")
                    self.end_headers()
                    self.wfile.write(b"Missing Metadata-Flavor: ibm header")
                    return

                # Read and ignore request body (expects {"expires_in": 300})
                content_length = int(self.headers.get("Content-Length", 0))
                if content_length > 0:
                    self.rfile.read(content_length)

                body = json.dumps(TOKEN_RESPONSE).encode("utf-8")
                self.send_response(200)
                self.send_header("Content-Type", "application/json; charset=utf-8")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
                return

            # Not found
            self.send_response(404)
            self.end_headers()

        def log_message(self, fmt, *args):
            return

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", "80"))
        server = HTTPServer(("", port), Handler)
        server.serve_forever()
