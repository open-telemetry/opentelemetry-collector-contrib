type: routing
display_name: Routing Connector

status:
  class: connector
  stability:
    alpha: [traces_to_traces, metrics_to_metrics, logs_to_logs]
  distributions: [contrib, k8s]
  codeowners:
    active: [TylerHelmuth, evan-bradley, edmocosta, bogdandrutu]
    emeritus: [jpkrohling, mwear]
    seeking_new: true

tests:
  skip_lifecycle: true
  skip_shutdown: true

feature_gates:
  - id: "connector.routing.defaultErrorModeIgnore"
    description: Changes the default error_mode of the routing connector from propagate to ignore
    stage: alpha
    from_version: v0.153.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/48418
