type: signal_to_metrics
deprecated_type: signaltometrics
display_name: Signal to Metrics Connector
description: Signal to metrics connector produces metrics from all signal types (traces, logs, or metrics).

status:
  class: connector
  stability:
    alpha:
      [
        traces_to_metrics,
        logs_to_metrics,
        metrics_to_metrics,
        profiles_to_metrics,
      ]
  distributions: [contrib]
  codeowners:
    active: [ChrsMark, lahsivjar]

feature_gates:
  - id: connector.signaltometrics.defaultErrorModeIgnore
    description: When enabled, the default error_mode is `ignore` instead of `propagate`.
    stage: alpha
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/48419

tests:
  config:
    spans:
      - name: span.duration.histogram
        description: "Span duration as histogram"
        unit: us
        histogram:
          value: Microseconds(end_time - start_time)
      - name: span.duration.exponential_histogram
        description: "Span duration as exponential histogram"
        unit: us
        exponential_histogram:
          value: Microseconds(end_time - start_time)
    logs:
      - name: logrecord.count
        description: "Count of log record"
        sum:
          value: "1" # Count each log record as 1, has to be a string
    datapoints:
      - name: datapoint.count
        description: "Count of datapoint"
        sum:
          value: Int(1) # Count each data point as 1, can also use the Int converter
