type: jaeger

status:
  disable_codecov_badge: true
  class: "pkg"
  codeowners:
    active: [open-telemetry/collector-approvers, frzifus]

feature_gates:
  - id: pkg.translator.jaeger.DontEmitV0HttpConventions
    stage: alpha
    description: >-
      When enabled, the Jaeger translator no longer emits the deprecated
      http.status_code attribute (semconv v1.25.0).
      Requires pkg.translator.jaeger.EmitV1HttpConventions to also be enabled.
    from_version: v0.156.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45036
    skip_strict_validation: true
  - id: pkg.translator.jaeger.EmitV1HttpConventions
    stage: alpha
    description: >-
      When enabled, the Jaeger translator emits http.response.status_code
      (semconv v1.40.0) instead of the deprecated http.status_code
      (semconv v1.25.0).
    from_version: v0.156.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45036
    skip_strict_validation: true
