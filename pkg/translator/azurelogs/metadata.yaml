type: azurelogs

status:
  disable_codecov_badge: true
  class: "pkg"
  codeowners:
    active: [atoulme, cparkins, MikeGoldsmith, constanca-m]
  stability:
    development: [logs]

feature_gates:
  - id: pkg.translator.azurelogs.dontEmitLegacyLogConventions
    stage: alpha
    description: When enabled, legacy semconv attribute names are not emitted.
    from_version: v0.147.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45033
  - id: pkg.translator.azurelogs.emitStableLogConventions
    stage: alpha
    description: When enabled, stable semconv attribute names are emitted.
    from_version: v0.147.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45033
