default:
  type: syslog_parser
rfc3164:
  type: syslog_parser
  protocol: rfc3164
rfc5424:
  type: syslog_parser
  protocol: rfc5424
none:
  type: syslog_parser
  protocol: none
location:
  type: syslog_parser
  protocol: rfc5424
  location: FOO
on_error_drop:
  type: syslog_parser
  protocol: rfc5424
  on_error: drop
parse_from_simple:
  type: syslog_parser
  protocol: rfc5424
  parse_from: body.from
parse_to_simple:
  type: syslog_parser
  protocol: rfc5424
  parse_to: body.log
scope_name:
  type: syslog_parser
  protocol: rfc5424
  scope_name:
    parse_from: body.logger_name_field
severity:
  type: syslog_parser
  protocol: rfc5424
  severity:
    parse_from: body.severity_field
    mapping:
      critical: 5xx
      error: 4xx
      info: 3xx
      debug: 2xx
timestamp:
  type: syslog_parser
  protocol: rfc5424
  timestamp:
    parse_from: body.timestamp_field
    layout_type: strptime
    layout: '%Y-%m-%d'
all_options_rfc3164:
  type: syslog_parser
  protocol: rfc3164
  enable_rfc3339: true
  enable_second_fractions: true
  enable_lenient_day: false
  enable_embedded_newlines: true
  enable_cisco_hostname: true
  cisco_ios:
    enable: true
    message_counter: false
    sequence_number: false
    hostname: false
    second_fractions: false
  year: 2026
  timezone: America/New_York
compliant_msg_rfc5424:
  type: syslog_parser
  protocol: rfc5424
  enable_compliant_msg: true
