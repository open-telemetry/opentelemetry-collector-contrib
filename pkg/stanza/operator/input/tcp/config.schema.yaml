$defs:
  base_config:
    description: BaseConfig is the detailed configuration of a tcp input operator.
    type: object
    properties:
      add_attributes:
        type: boolean
      encoding:
        type: string
      listen_address:
        type: string
      max_log_size:
        $ref: /pkg/stanza/operator/helper.byte_size
      multiline:
        $ref: /pkg/stanza/split.config
      one_log_per_packet:
        type: boolean
      proxy_protocol:
        description: >-
          When true, each incoming TCP connection is expected to begin with a
          Proxy Protocol v2 header. The receiver uses the source address carried
          in that header instead of the raw TCP remote address.
        type: boolean
      tls:
        x-pointer: true
        $ref: go.opentelemetry.io/collector/config/configtls.server_config
    allOf:
      - $ref: /pkg/stanza/trim.config
  config:
    description: Config is the configuration of a tcp input operator.
    type: object
    allOf:
      - $ref: /pkg/stanza/operator/helper.input_config
      - $ref: base_config
