$defs:
  async_config:
    type: object
    properties:
      max_queue_length:
        type: integer
      processors:
        type: integer
      readers:
        type: integer
  base_config:
    description: BaseConfig is the details configuration of a udp input operator.
    type: object
    properties:
      add_attributes:
        type: boolean
      async:
        x-pointer: true
        $ref: async_config
      encoding:
        type: string
      listen_address:
        type: string
      multiline:
        $ref: /pkg/stanza/split.config
      one_log_per_packet:
        type: boolean
      proxy_protocol:
        description: >-
          When true, each incoming UDP datagram is expected to begin with a
          Proxy Protocol v2 header. The source address carried in that header
          is used instead of the raw UDP sender address.
        type: boolean
    allOf:
      - $ref: /pkg/stanza/trim.config
  config:
    description: Config is the configuration of a udp input operator.
    type: object
    allOf:
      - $ref: /pkg/stanza/operator/helper.input_config
      - $ref: base_config
