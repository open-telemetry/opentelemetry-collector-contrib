$defs:
  config:
    description: Config is the configuration of a windows event log operator.
    type: object
    properties:
      channel:
        type: string
      event_data_format:
        $ref: event_data_format
      exclude_providers:
        type: array
        items:
          type: string
      ignore_channel_errors:
        type: boolean
      include_log_record_original:
        type: boolean
      max_events_per_poll:
        type: integer
      max_reads:
        type: integer
      poll_interval:
        type: string
        format: duration
      query:
        x-pointer: true
        type: string
      raw:
        type: boolean
      remote:
        $ref: remote_config
      start_at:
        type: string
      suppress_rendering_info:
        type: boolean
      wait_timeout:
        description: WaitTimeout is the maximum duration to wait for new events before performing a safety-net poll in event-driven mode (see stanza.windows.eventDrivenScraping feature gate). Under normal conditions the subscription signal fires immediately, so this value is rarely reached. Defaults to 5s. Ignored when the feature gate is not enabled.
        type: string
        format: duration
    allOf:
      - $ref: /pkg/stanza/operator/helper.input_config
  event_data_format:
    description: EventDataFormat controls the structure of the event_data field in the log body.
    type: string
  remote_config:
    description: RemoteConfig is the configuration for a remote server.
    type: object
    properties:
      domain:
        type: string
      password:
        type: string
      server:
        type: string
      username:
        type: string
