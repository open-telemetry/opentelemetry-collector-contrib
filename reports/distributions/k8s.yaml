name: k8s
url: https://github.com/open-telemetry/opentelemetry-collector-releases/tree/main/distributions/otelcol-k8s
maintainers: []
components:
    connector:
        - count
        - exceptions
        - failover
        - otlp_json
        - round_robin
        - routing
        - service_graph
    exporter:
        - file
        - loadbalancing
        - otelarrow
    extension:
        - ack
        - basicauth
        - bearertokenauth
        - file_storage
        - headers_setter
        - health_check
        - host_observer
        - http_forwarder
        - k8s_leader_elector
        - k8s_observer
        - oauth2client
        - oidc
        - opamp
        - pprof
    processor:
        - attributes
        - cumulativetodelta
        - deltatocumulative
        - deltatorate
        - drain
        - filter
        - groupbyattrs
        - groupbytrace
        - interval
        - k8s_attributes
        - log_dedup
        - metrics_transform
        - probabilistic_sampler
        - redaction
        - remotetap
        - resource
        - resourcedetection
        - tail_sampling
        - transform
    receiver:
        - file_log
        - fluent_forward
        - host_metrics
        - http_check
        - jaeger
        - journald
        - k8s_cluster
        - k8s_events
        - k8s_objects
        - kubelet_stats
        - otelarrow
        - prometheus
        - receiver_creator
        - zipkin
    scraper:
        - cpu
        - disk
        - filesystem
        - load
        - memory
        - network
        - nfs
        - paging
        - process
        - processes
        - system
