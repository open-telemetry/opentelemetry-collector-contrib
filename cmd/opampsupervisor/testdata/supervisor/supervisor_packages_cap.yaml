server:
  endpoint: ws://{{.url}}/v1/opamp

capabilities:
  reports_effective_config: true
  reports_health: true
  accepts_packages: true
  reports_package_statuses: true

storage:
  directory: '{{.storage_dir}}'

agent:
  executable: ../../bin/otelcontribcol_{{.goos}}_{{.goarch}}{{.extension}}

telemetry:
  logs:
    level: {{.log_level}}
    output_paths:
      - '{{.log_file}}'
      - 'stdout'
