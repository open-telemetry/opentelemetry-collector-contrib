receivers:
  file_log:
    include: 
      - ${IN_FILE}
    start_at: "beginning"

exporters:
  file:
    path: ${OUT_FILE}

extensions:
  health_check/e2e:
    endpoint: "localhost:${HEALTHCHECK_PORT}"

service:
  extensions: [health_check/e2e]
  pipelines:
    logs:
      receivers: [file_log]
      exporters: [file]
