receivers:
  filelog:
    include: [{{.inputLogFile}}]
    start_at: "beginning"

exporters:
  file:
    path: {{.outputLogFile}}

extensions:
  health_check:
    endpoint: "localhost:13133"

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [filelog]
      exporters: [file]
  telemetry:
    logs:
      level: debug
    resource:
      service.name: otelcontribcol
      service.version: "1.0.0"
      service.instance.id: "test-instance"
