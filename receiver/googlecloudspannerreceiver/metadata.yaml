display_name: Google Cloud Spanner Receiver
type: google_cloud_spanner
deprecated_type: googlecloudspanner

status:
  class: receiver
  stability:
    beta: [metrics]
  distributions: [contrib]
  codeowners:
    active: [dashpole, KiranmayiB, nsj07]
    emeritus: [architjugran, varunraiko, harishbohara11, dsimil]
tests:
  config:
  goleak:
    skip: true

attributes:
  row_range_start_key:
    description: Spanner ROW_RANGE_START_KEY label.
    type: string
  sample_lock_requests:
    description: Spanner SAMPLE_LOCK_REQUESTS label.
    type: string
  query_text:
    description: Spanner TEXT label.
    type: string
  request_tag:
    description: Spanner REQUEST_TAG label.
    type: string
  query_text_truncated:
    description: Spanner TEXT_TRUNCATED label.
    type: bool
  query_text_fingerprint:
    description: Spanner TEXT_FINGERPRINT label.
    type: int
  read_columns:
    description: Spanner READ_COLUMNS label.
    type: string
  fingerprint:
    description: Spanner FPRINT label.
    type: int
  transaction_tag:
    description: Spanner TRANSACTION_TAG label.
    type: string
  write_constructive_columns:
    description: Spanner WRITE_CONSTRUCTIVE_COLUMNS label.
    type: string
  write_delete_tables:
    description: Spanner WRITE_DELETE_TABLES label.
    type: string
  table_name:
    description: Spanner TABLE_NAME label.
    type: string

metrics:
  database_spanner_active_queries_summary_active_count:
    description: Corresponds to Spanner's ACTIVE_COUNT column.
    stability: development
    enabled: true
    gauge:
      value_type: int
    unit: "1"
  database_spanner_active_queries_summary_count_older_than_1s:
    description: Corresponds to Spanner's COUNT_OLDER_THAN_1S column.
    stability: development
    enabled: true
    gauge:
      value_type: int
    unit: "1"
  database_spanner_active_queries_summary_count_older_than_10s:
    description: Corresponds to Spanner's COUNT_OLDER_THAN_10S column.
    stability: development
    enabled: true
    gauge:
      value_type: int
    unit: "1"
  database_spanner_active_queries_summary_count_older_than_100s:
    description: Corresponds to Spanner's COUNT_OLDER_THAN_100S column.
    stability: development
    enabled: true
    gauge:
      value_type: int
    unit: "1"
  database_spanner_lock_stats_top_lock_wait_seconds:
    description: Corresponds to Spanner's LOCK_WAIT_SECONDS column.
    stability: development
    enabled: true
    gauge:
      value_type: double
    unit: s
    attributes:
      - row_range_start_key
      - sample_lock_requests
  database_spanner_lock_stats_total_total_lock_wait_seconds:
    description: Corresponds to Spanner's TOTAL_LOCK_WAIT_SECONDS column.
    stability: development
    enabled: true
    gauge:
      value_type: double
    unit: s
  database_spanner_query_stats_top_execution_count:
    description: Corresponds to Spanner's EXECUTION_COUNT column.
    stability: development
    enabled: true
    gauge:
      value_type: int
    unit: "1"
    attributes:
      - query_text
      - request_tag
      - query_text_truncated
      - query_text_fingerprint
  database_spanner_query_stats_top_avg_latency_seconds:
    description: Corresponds to Spanner's AVG_LATENCY_SECONDS column.
    stability: development
    enabled: true
    gauge:
      value_type: double
    unit: s
    attributes:
      - query_text
      - request_tag
      - query_text_truncated
