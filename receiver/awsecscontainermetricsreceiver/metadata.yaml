display_name: AWS ECS Container Metrics Receiver
type: awsecscontainermetrics

status:
  class: receiver
  stability:
    beta: [metrics]
  distributions: [contrib]
  codeowners:
    active: [Aneurysm9]

feature_gates:
  - id: receiver.awsecscontainermetrics.EmitContainerImageTagsAsSlice
    stage: alpha
    description: >-
      When enabled, the receiver emits container.image.tags as a string array
      (semconv v1.40.0) instead of container.image.tag as a string (semconv v1.21.0).
    from_version: v0.154.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/22095
    skip_strict_validation: true

# TODO: Update the receiver to pass the tests
tests:
  skip_lifecycle: true
  skip_shutdown: true
