resourceMetrics:
  - resource:
      attributes:
        - key: server.address
          value:
            stringValue: Arves-MacBook-Pro.fritz.box
        - key: server.port
          value:
            intValue: "32975"
        - key: service.instance.id
          value:
            stringValue: a5946788-4308-5045-ac8f-a7e3734ce46c
    scopeMetrics:
      - metrics:
          - description: The number of backends.
            name: postgresql.backends
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "3"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: postgres
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            unit: "1"
          - description: Number of buffers allocated.
            name: postgresql.bgwriter.buffers.allocated
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "780"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{buffers}'
          - description: Number of buffers written.
            name: postgresql.bgwriter.buffers.writes
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "14"
                  attributes:
                    - key: source
                      value:
                        stringValue: backend
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: source
                      value:
                        stringValue: backend_fsync
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: source
                      value:
                        stringValue: bgwriter
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "67"
                  attributes:
                    - key: source
                      value:
                        stringValue: checkpoints
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{buffers}'
          - description: The number of checkpoints performed.
            name: postgresql.bgwriter.checkpoint.count
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "4"
                  attributes:
                    - key: type
                      value:
                        stringValue: requested
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: type
                      value:
                        stringValue: scheduled
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{checkpoints}'
          - description: Total time spent writing and syncing files to disk by checkpoints.
            name: postgresql.bgwriter.duration
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asDouble: 86
                  attributes:
                    - key: type
                      value:
                        stringValue: sync
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 8
                  attributes:
                    - key: type
                      value:
                        stringValue: write
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: ms
          - description: Number of times the background writer stopped a cleaning scan because it had written too many buffers.
            name: postgresql.bgwriter.maxwritten
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: Number of times disk blocks were found already in the buffer cache.
            name: postgresql.blks_hit
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "2330"
