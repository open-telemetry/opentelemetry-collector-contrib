type: object
properties:
  endpoint:
    description: 'Endpoint is the published address or unix socket that allows clients to connect to: The allowed format is: unix:///path/to/chronyd/unix.sock udp://localhost:323 The default value is unix:///var/run/chrony/chronyd.sock'
    type: string
  file_mount_path:
    description: 'FileMountPath is the directory where the receiver creates a random unixgram reply socket. Use it only when the collector and chronyd run in different network namespaces but share a filesystem volume. This directory should be dedicated to chronyd and the collector. Prefer an ephemeral mount because ungraceful exits can leave stale socket files behind. When empty, Go''s default abstract socket autobind is used (same-namespace only). Example: /run/chrony'
    type: string
allOf:
  - $ref: go.opentelemetry.io/collector/scraper/scraperhelper.controller_config
  - $ref: ./internal/metadata.metrics_builder_config
