type: object
properties:
  endpoint:
    description: 'Endpoint is the published address or unix socket that allows clients to connect to: The allowed format is: unix:///path/to/chronyd/unix.sock udp://localhost:323 The default value is unix:///var/run/chrony/chronyd.sock'
    type: string
  local_endpoint:
    description: 'LocalEndpoint is the local address to bind when using Unix datagram sockets. Required when the collector and chronyd run in separate network namespaces (e.g., different containers) sharing a filesystem volume for the socket. When empty, Go''s default abstract socket autobind is used (same-namespace only). Example: unix:///run/chrony/otel-reply.sock'
    type: string
allOf:
  - $ref: go.opentelemetry.io/collector/scraper/scraperhelper.controller_config
  - $ref: ./internal/metadata.metrics_builder_config
