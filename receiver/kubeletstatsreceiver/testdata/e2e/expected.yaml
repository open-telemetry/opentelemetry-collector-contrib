version: 1
signal: metrics
resources/include:
  - attributes:
      k8s.node.name: kind-control-plane
    scopes/include:
      - name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kubeletstatsreceiver
        version: latest
        metrics/include:
          - name: k8s.node.cpu.time
            type: Sum
            unit: s
            monotonic: true
          - name: k8s.node.memory.usage
            type: Gauge
            unit: By