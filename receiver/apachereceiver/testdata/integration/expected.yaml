resourceMetrics:
  - resource:
      attributes:
        - key: apache.server.name
          value:
            stringValue: localhost
        - key: apache.server.port
          value:
            stringValue: "32771"
    scopeMetrics:
      - metrics:
          - description: The number of connections in different asynchronous states reported by Apache's server-status.
            gauge:
              dataPoints:
                - asInt: "0"
                  attributes:
                    - key: connection_state
                      value:
                        stringValue: closing
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: connection_state
                      value:
                        stringValue: keepalive
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: connection_state
                      value:
                        stringValue: writing
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.connections.async
            unit: '{connections}'
          - description: Current load of the CPU.
            gauge:
              dataPoints:
                - asDouble: 0.5
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.cpu.load
            unit: '%'
          - description: Jiffs used by processes of given category.
            name: apache.cpu.time
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asDouble: 0
                  attributes:
                    - key: level
                      value:
                        stringValue: children
                    - key: mode
                      value:
                        stringValue: system
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 0
                  attributes:
                    - key: level
                      value:
                        stringValue: children
                    - key: mode
                      value:
                        stringValue: user
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 0.01
                  attributes:
                    - key: level
                      value:
                        stringValue: self
                    - key: mode
                      value:
                        stringValue: system
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 0
                  attributes:
                    - key: level
                      value:
                        stringValue: self
                    - key: mode
                      value:
                        stringValue: user
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{jiff}'
          - description: The number of active connections currently attached to the HTTP server.
            name: apache.current_connections
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            unit: '{connections}'
          - description: Average number of bytes transmitted per second since the server was started, as reported by mod_status.
            gauge:
              dataPoints:
                - asDouble: 512
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.io.transmitted.rate
            unit: By/s
          - description: The average server load during the last minute.
            gauge:
              dataPoints:
                - asDouble: 0.66
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.load.1
            unit: '%'
          - description: The average server load during the last 15 minutes.
            gauge:
              dataPoints:
                - asDouble: 0.85
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.load.15
            unit: '%'
          - description: The average server load during the last 5 minutes.
            gauge:
              dataPoints:
                - asDouble: 0.8
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.load.5
            unit: '%'
          - description: Average number of requests served per second since the server was started, as reported by mod_status.
            gauge:
              dataPoints:
                - asDouble: 0.5
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.request.rate
            unit: '{request}/s'
          - description: Total time spent on handling requests.
            name: apache.request.time
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: ms
          - description: The number of requests serviced by the HTTP server per second.
            name: apache.requests
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "1"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{requests}'
          - description: The number of workers in each state.
            name: apache.scoreboard
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: closing
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: dnslookup
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: finishing
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: idle_cleanup
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: keepalive
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: logging
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "325"
                  attributes:
                    - key: state
                      value:
                        stringValue: open
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: reading
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "1"
                  attributes:
                    - key: state
                      value:
                        stringValue: sending
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: state
                      value:
                        stringValue: starting
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "74"
                  attributes:
                    - key: state
                      value:
                        stringValue: waiting
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            unit: '{workers}'
          - description: Total HTTP server traffic.
            name: apache.traffic
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "1024"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: By
          - description: The amount of time that the server has been running in seconds.
            name: apache.uptime
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "2"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: s
          - description: The maximum number of worker slots configured for the HTTP server, derived from the scoreboard length.
            gauge:
              dataPoints:
                - asInt: "400"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: apache.worker.limit
            unit: '{worker}'
          - description: The number of workers currently attached to the HTTP server.
            name: apache.workers
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "1"
                  attributes:
                    - key: state
                      value:
                        stringValue: busy
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "74"
                  attributes:
                    - key: state
                      value:
                        stringValue: idle
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            unit: '{workers}'
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/apachereceiver
          version: latest
