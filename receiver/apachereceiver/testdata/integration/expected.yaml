resourceMetrics:
  - resource:
      attributes:
        - key: apache.server.name
          value:
            stringValue: localhost
        - key: apache.server.port
          value:
            stringValue: "8081"
    scopeMetrics:
      - metrics:
          - description: The number of active connections currently attached to the HTTP server.
            name: apache.connection.active
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "110"
                  timeUnixNano: "1632495518500962000"
            unit: '{connection}'
          - description: The number of connections in different asynchronous states reported by Apache's server-status.
            gauge:
              dataPoints:
              - asInt: "2"
                attributes:
                - key: apache.connection.state
                  value:
                    stringValue: writing
                timeUnixNano: "1632495518500962000"
              - asInt: "1"
                attributes:
                - key: apache.connection.state
                  value:
                    stringValue: keepalive
                timeUnixNano: "1632495518500962000"
              - asInt: "1"
                attributes:
                - key: apache.connection.state
                  value:
                    stringValue: closing
                timeUnixNano: "1632495518500962000"
            name: apache.connections
            unit: '{connection}'
          - description: Current load of the CPU.
            gauge:
              dataPoints:
                - asDouble: 0.66
                  timeUnixNano: "1632495518500962000"
            name: apache.cpu.load
            unit: '%'
          - description: Jiffs used by processes of given category.
            name: apache.cpu.time
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asDouble: 0.01
                  attributes:
                    - key: apache.process.level
                      value:
                        stringValue: children
                    - key: cpu.mode
                      value:
                        stringValue: system
                  timeUnixNano: "1632495518500962000"
                - asDouble: 0.02
                  attributes:
                    - key: apache.process.level
                      value:
                        stringValue: children
                    - key: cpu.mode
                      value:
                        stringValue: user
                  timeUnixNano: "1632495518500962000"
                - asDouble: 0.03
                  attributes:
                    - key: apache.process.level
                      value:
                        stringValue: self
                    - key: cpu.mode
                      value:
                        stringValue: system
                  timeUnixNano: "1632495518500962000"
                - asDouble: 0.04
                  attributes:
                    - key: apache.process.level
                      value:
                        stringValue: self
                    - key: cpu.mode
                      value:
                        stringValue: user
                  timeUnixNano: "1632495518500962000"
              isMonotonic: true
            unit: '{jiff}'
          - description: The average server load during the last minute.
            gauge:
              dataPoints:
                - asDouble: 0.9
                  timeUnixNano: "1632495518500962000"
            name: apache.load.1
            unit: '%'
          - description: The average server load during the last 15 minutes.
            gauge:
              dataPoints:
                - asDouble: 0.3
                  timeUnixNano: "1632495518500962000"
            name: apache.load.15
            unit: '%'
          - description: The average server load during the last 5 minutes.
            gauge:
              dataPoints:
                - asDouble: 0.4
                  timeUnixNano: "1632495518500962000"
            name: apache.load.5
            unit: '%'
          - description: The number of requests serviced by the HTTP server.
            name: apache.request.count
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "14169"
                  timeUnixNano: "1632495518500962000"
              isMonotonic: true
            unit: '{request}'
          - description: Total time spent on handling requests.
            name: apache.request.time
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "1501"
                  timeUnixNano: "1632495518500962000"
              isMonotonic: true
            unit: ms
          - description: Total HTTP server traffic.
            name: apache.traffic
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "21411840"
                  timeUnixNano: "1632495518500962000"
              isMonotonic: true
            unit: By
          - description: The amount of time that the server has been running in seconds.
            name: apache.uptime
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "410"
                  timeUnixNano: "1632495518500962000"
              isMonotonic: true
            unit: s
          - description: The number of busy workers currently attached to the HTTP server.
            name: apache.worker.active
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "13"
                  timeUnixNano: "1632495518500962000"
            unit: '{worker}'
          - description: The number of idle workers currently attached to the HTTP server.
            name: apache.worker.idle
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "227"
                  timeUnixNano: "1632495518500962000"
            unit: '{worker}'
          - description: The number of workers in each state.
            name: apache.workers
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "217"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: waiting
                  timeUnixNano: "1632495518500962000"
                - asInt: "2"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: keepalive
                  timeUnixNano: "1632495518500962000"
                - asInt: "1"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: logging
                  timeUnixNano: "1632495518500962000"
                - asInt: "3"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: finishing
                  timeUnixNano: "1632495518500962000"
                - asInt: "150"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: open
                  timeUnixNano: "1632495518500962000"
                - asInt: "4"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: idle_cleanup
                  timeUnixNano: "1632495518500962000"
                - asInt: "1"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: starting
                  timeUnixNano: "1632495518500962000"
                - asInt: "4"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: reading
                  timeUnixNano: "1632495518500962000"
                - asInt: "12"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: sending
                  timeUnixNano: "1632495518500962000"
                - asInt: "2"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: dnslookup
                  timeUnixNano: "1632495518500962000"
                - asInt: "4"
                  attributes:
                    - key: apache.worker.state
                      value:
                        stringValue: closing
                  timeUnixNano: "1632495518500962000"
            unit: '{worker}'
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/apachereceiver
          version: latest
