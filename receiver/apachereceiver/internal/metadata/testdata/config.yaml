default:
all_set:
  metrics:
    apache.connection.active:
      enabled: true
    apache.connections:
      enabled: true
      attributes: ["apache.connection.state"]
    apache.cpu.load:
      enabled: true
    apache.cpu.time:
      enabled: true
      attributes: ["apache.process.level","cpu.mode"]
    apache.load.1:
      enabled: true
    apache.load.15:
      enabled: true
    apache.load.5:
      enabled: true
    apache.request.count:
      enabled: true
    apache.request.time:
      enabled: true
    apache.traffic:
      enabled: true
    apache.uptime:
      enabled: true
    apache.worker.active:
      enabled: true
    apache.worker.idle:
      enabled: true
    apache.workers:
      enabled: true
      attributes: ["apache.worker.state"]
  resource_attributes:
    apache.server.name:
      enabled: true
    apache.server.port:
      enabled: true
reaggregate_set:
  metrics:
    apache.connection.active:
      enabled: true
    apache.connections:
      enabled: true
      attributes: []
    apache.cpu.load:
      enabled: true
    apache.cpu.time:
      enabled: true
      attributes: []
    apache.load.1:
      enabled: true
    apache.load.15:
      enabled: true
    apache.load.5:
      enabled: true
    apache.request.count:
      enabled: true
    apache.request.time:
      enabled: true
    apache.traffic:
      enabled: true
    apache.uptime:
      enabled: true
    apache.worker.active:
      enabled: true
    apache.worker.idle:
      enabled: true
    apache.workers:
      enabled: true
      attributes: []
  resource_attributes:
    apache.server.name:
      enabled: true
    apache.server.port:
      enabled: true
none_set:
  metrics:
    apache.connection.active:
      enabled: false
    apache.connections:
      enabled: false
      attributes: ["apache.connection.state"]
    apache.cpu.load:
      enabled: false
    apache.cpu.time:
      enabled: false
      attributes: ["apache.process.level","cpu.mode"]
    apache.load.1:
      enabled: false
    apache.load.15:
      enabled: false
    apache.load.5:
      enabled: false
    apache.request.count:
      enabled: false
    apache.request.time:
      enabled: false
    apache.traffic:
      enabled: false
    apache.uptime:
      enabled: false
    apache.worker.active:
      enabled: false
    apache.worker.idle:
      enabled: false
    apache.workers:
      enabled: false
      attributes: ["apache.worker.state"]
  resource_attributes:
    apache.server.name:
      enabled: false
    apache.server.port:
      enabled: false
filter_set_include:
  resource_attributes:
    apache.server.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    apache.server.port:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    apache.server.name:
      enabled: true
      metrics_exclude:
        - strict: "apache.server.name-val"
    apache.server.port:
      enabled: true
      metrics_exclude:
        - strict: "apache.server.port-val"
