prometheus/withAPIEnabled:
  api_server:
    enabled: true
    server_config:
      endpoint: "localhost:9090"
  config:
    scrape_configs:
      - job_name: 'demo'
        scrape_interval: 5s
        fallback_scrape_protocol: "PrometheusText1.0.0"
prometheus/withoutAPI:
  config:
    scrape_configs:
      - job_name: 'demo'
        scrape_interval: 5s
        fallback_scrape_protocol: "PrometheusText1.0.0"
prometheus/withAPIUsingDefaults:
  api_server: {}
  config:
    scrape_configs:
      - job_name: 'demo'
        scrape_interval: 5s
        fallback_scrape_protocol: "PrometheusText1.0.0"
prometheus/withInvalidAPIConfig:
  api_server:
    server_config:
      transport: "invalid"
  config:
    scrape_configs:
      - job_name: 'demo'
        scrape_interval: 5s
        fallback_scrape_protocol: "PrometheusText1.0.0"
prometheus/withAPIEnabledExplicitly:
  api_server:
    enabled: true
    server_config:
      endpoint: "localhost:9090"
  config:
    scrape_configs:
      - job_name: 'demo'
        scrape_interval: 5s
        fallback_scrape_protocol: "PrometheusText1.0.0"
prometheus/withAPIDisabledExplicitly:
  api_server:
    enabled: false
    server_config:
      endpoint: "localhost:9090"
  config:
    scrape_configs:
      - job_name: 'demo'
        scrape_interval: 5s
        fallback_scrape_protocol: "PrometheusText1.0.0"
