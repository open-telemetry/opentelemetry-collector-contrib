display_name: Prometheus Receiver
type: prometheus

description: |
  The Prometheus Receiver receives metric data in [Prometheus](https://prometheus.io/) format.

status:
  class: receiver
  stability:
    beta: [metrics]
  distributions: [core, contrib, k8s]
  codeowners:
    active: [Aneurysm9, dashpole, ArthurSens, krajorama]
tests:
  config:
    config:
      scrape_configs:
        - job_name: 'test'
  goleak:
    ignore:
      top:
        # See https://github.com/census-instrumentation/opencensus-go/issues/1191 for more information.
        - "go.opencensus.io/stats/view.(*worker).start"

feature_gates:
  - id: receiver.prometheusreceiver.EnableCreatedTimestampZeroIngestion
    stage: alpha
    description: >-
      Enables the Prometheus created-timestamps-zero-injection feature.
      Created timestamps are injected as 0-valued samples when appropriate.
      This is disabled by default due to worse CPU performance with higher metric volumes.
    from_version: v0.113.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/40355

  - id: receiver.prometheusreceiver.IgnoreScopeInfoMetric
    stage: alpha
    description: >-
      When enabled, the `otel_scope_info` metric is ignored for scope attribute extraction.
    from_version: v0.148.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/41502
