display_name: AWS X-Ray Receiver
type: awsxray

status:
  class: receiver
  stability:
    beta: [traces]
  distributions: [contrib]
  codeowners:
    active: [wangzlei, srprash]

# TODO: Update the receiver to make the tests pass
tests:
  skip_lifecycle: true
  skip_shutdown: true
feature_gates:
  - id: receiver.awsxray.DontEmitV0HttpConventions
    stage: alpha
    description: >-
      When enabled, semconv legacy HTTP attributes are disabled.
    from_version: v0.156.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45085
  - id: receiver.awsxray.EmitV1HttpConventions
    stage: alpha
    description: >-
      When enabled, semconv stable HTTP attributes are enabled.
    from_version: v0.156.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/45085
