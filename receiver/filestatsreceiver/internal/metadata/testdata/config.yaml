default:
all_set:
  metrics:
    file.atime:
      enabled: true
      attributes: []
    file.count:
      enabled: true
      attributes: []
    file.ctime:
      enabled: true
      attributes: ["file.permissions"]
    file.mtime:
      enabled: true
      attributes: []
    file.size:
      enabled: true
      attributes: []
  resource_attributes:
    file.name:
      enabled: true
    file.path:
      enabled: true
reaggregate_set:
  metrics:
    file.atime:
      enabled: true
      attributes: []
    file.count:
      enabled: true
      attributes: []
    file.ctime:
      enabled: true
      attributes: []
    file.mtime:
      enabled: true
      attributes: []
    file.size:
      enabled: true
      attributes: []
  resource_attributes:
    file.name:
      enabled: true
    file.path:
      enabled: true
none_set:
  metrics:
    file.atime:
      enabled: false
      attributes: []
    file.count:
      enabled: false
      attributes: []
    file.ctime:
      enabled: false
      attributes: ["file.permissions"]
    file.mtime:
      enabled: false
      attributes: []
    file.size:
      enabled: false
      attributes: []
  resource_attributes:
    file.name:
      enabled: false
    file.path:
      enabled: false
filter_set_include:
  resource_attributes:
    file.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    file.path:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    file.name:
      enabled: true
      metrics_exclude:
        - strict: "file.name-val"
    file.path:
      enabled: true
      metrics_exclude:
        - strict: "file.path-val"
