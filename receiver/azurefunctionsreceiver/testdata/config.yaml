azure_functions:
  http_config:
    endpoint: test:123
  auth: azureauth
  event_hub:
    logs:
      - name: logs
        encoding: azure_encoding
      - name: raw_logs
        encoding: azureresourcelogs_encoding
    include_metadata: true

azure_functions/no_auth:
  http_config:
    endpoint: test:123
  event_hub:
    logs:
      - name: logs
        encoding: azure_encoding

azure_functions/no_http_config:
  auth: azureauth
  event_hub:
    logs:
      - name: logs
        encoding: azure_encoding

azure_functions/no_event_hub:
  http_config:
    endpoint: test:123
  auth: azureauth

azure_functions/empty_event_hub_logs:
  http_config:
    endpoint: test:123
  auth: azureauth
  event_hub:
    logs: []

azure_functions/missing_binding_name:
  http_config:
    endpoint: test:123
  auth: azureauth
  event_hub:
    logs:
      - encoding: azure_encoding

azure_functions/missing_binding_encoding:
  http_config:
    endpoint: test:123
  auth: azureauth
  event_hub:
    logs:
      - name: logs

azure_functions/duplicate_binding_name:
  http_config:
    endpoint: test:123
  auth: azureauth
  event_hub:
    logs:
      - name: logs
        encoding: azure_encoding
      - name: logs
        encoding: azureresourcelogs_encoding
