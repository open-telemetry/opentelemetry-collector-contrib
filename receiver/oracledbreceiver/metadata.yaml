display_name: Oracle DB Receiver
type: oracledb

description: |
  This receiver periodically queries an Oracle Database host to collect metrics.

override_value_enabled: true

status:
  class: receiver
  stability:
    alpha: [metrics]
    development: [logs]
  distributions: [contrib]
  codeowners:
    active: [dmitryax, crobert-1, atoulme]

resource_attributes:
  host.name:
    description: The host name of Oracle Server
    enabled: true
    type: string
  oracle.db.hosting_type:
    description: The hosting environment of the Oracle instance. One of "self-managed", "rds", or "oci".
    enabled: true
    type: string
  oracle.db.open_mode:
    description: The open mode of the Oracle database (e.g. "READ WRITE", "READ ONLY", "MOUNTED").
    enabled: true
    type: string
  oracle.db.role:
    description: The database role of the Oracle instance (e.g. "PRIMARY", "PHYSICAL STANDBY").
    enabled: true
    type: string
  oracle.db.version:
    description: The Oracle Database version string.
    enabled: true
    type: string
  oracledb.instance.name:
    description: The name of the instance that data is coming from.
    enabled: true
    type: string
  service.instance.id:
    description: A unique identifier of the Oracle DB instance in the format host:port/serviceName. (defaults to 'unknown:1521', in case of error in generating this value)
    enabled: true
    type: string
  service.name:
    description: "Logical name of the service. When enabled, defaults to unknown_service:oracle."
    enabled: false
    type: string
  service.namespace:
    description: Logical namespace for the service (for example team or environment). When enabled, defaults to an empty string until set via configuration.
    enabled: false
    type: string

attributes:
  client.address:
    description: Hostname or address of the client.
    type: string
  client.port:
    description: TCP port used by the client.
    type: int
  db.namespace:
    description: The database name.
    type: string
  db.query.comment_tags:
    description: Filtered SQL query comments extracted from leading block comments. Contains comma-separated key=value pairs for keys specified in allowed_comment_keys configuration. Used for correlation with APM traces.
    type: string
  db.query.text:
    description: The text of the database query being executed.
    type: string
  db.server.name:
    description: The name of the server hosting the database.
    type: string
  db.system.name:
    description: The database management system (DBMS) product as identified by the client instrumentation.
    type: string
  destination.type:
    description: Type of the SQL*Net destination endpoint (client application or remote database link).
    type: string
    enum: [client, dblink]
  disk.io.block_size:
    description: Multi-block vs single-block (all) I/O request grouping.
    type: string
    enum: [all, multi]
  disk.io.direction:
    description: Direction of the storage I/O operation.
    type: string
    enum: [read, write]
  disk.io.type:
    description: Whether the I/O bytes are buffered (cache-mediated) or total (raw transfer count).
    type: string
    enum: [buffered, total]
  network.io.direction:
    description: Direction of the SQL*Net network transfer.
    type: string
    enum: [receive, transmit]
  network.peer.address:
    description: IP address of the peer client.
    type: string
  network.peer.port:
    description: TCP port used by the peer client.
    type: int
  oracle.db.pdb:
    description: The name of the pluggable database (PDB) the data point belongs to. Emit one data point per PDB on CDB-root connections and one per direct-PDB connection; empty otherwise. When disabled, per-PDB collection is skipped and each metric emits a single instance-wide data point.
    type: string
    requirement_level: opt_in
  oracle.db.service:
    description: The Oracle service name associated with the database connection.
    type: string
  oracledb.application_wait_time:
    description: The total time (in seconds) a query spent waiting on the application before it could proceed with execution (reporting delta).
    type: double
  oracledb.blocking.blocker.root_sid:
    description: The session ID (SID) of the root/head blocker at the top of the blocking chain. Empty string when there is no blocking.
    type: string
  oracledb.blocking.blocker.sid:
    description: The session ID (SID) of the immediate blocker of this session. Empty string when the session is not blocked.
    type: string
  oracledb.blocking.blocker.state:
    description: The status of the blocking session relationship (e.g. VALID, NOT IN WAIT, GLOBAL, NO HOLDER, UNKNOWN).
    type: string
  oracledb.blocking.lock.mode:
    description: The lock mode being requested by the blocked session (e.g., ROW SHARE, ROW EXCLUSIVE, SHARE, SHARE ROW EXCLUSIVE, EXCLUSIVE). Empty when not waiting on a lock.
    type: string
  oracledb.blocking.lock.type:
    description: The type of enqueue lock the session is waiting on, extracted from the wait event (e.g., TX for row lock, TM for table lock). Empty when not waiting on a lock.
    type: string
  oracledb.blocking.object.name:
    description: The name of the database object the session is waiting to lock. Empty when no object lock wait is active.
    type: string
  oracledb.blocking.object.owner:
    description: The owner (schema) of the database object the session is waiting to lock. Empty when no object lock wait is active.
    type: string
  oracledb.blocking.start_time:
    description: Estimated UTC timestamp of when the blocking wait began, derived from SYSDATE - SECONDS_IN_WAIT. RFC3339 format.
    type: string
  oracledb.blocking.wait_duration:
    description: The number of seconds this session has been waiting for the current wait event.
    type: int
  oracledb.buffer.state:
    description: The state of a buffer encountered while inspecting the LRU queue for a reusable buffer (free = a reusable buffer that was skipped; dirty = a dirty buffer found).
    type: string
    enum: [free, dirty]
  oracledb.buffer_gets:
    description: Number of logical reads (i.e., buffer cache accesses) performed by a query (reporting delta).
    type: int
  oracledb.call.type:
    description: Type of call reported by Oracle.
    type: string
    enum: [recursive, user]
  oracledb.child_address:
    description: Address of the child cursor.
    type: string
  oracledb.child_number:
    description: The child number of the query.
    type: string
  oracledb.cluster_wait_time:
    description: Total time (in seconds) that a query waited due to Oracle Real Application Clusters (RAC) coordination (reporting delta).
    type: double
  oracledb.command_type:
    description: Command type of the query.
    type: int
  oracledb.concurrency_wait_time:
    description: Total time (in seconds) a query spent waiting on concurrency-related events (reporting delta).
    type: double
  oracledb.cpu_time:
    description: Total time (in seconds) that the CPU spent actively processing a query, excluding time spent waiting (reporting delta).
    type: double
  oracledb.direct_reads:
    description: The number of direct path reads performed by a query — i.e., data blocks read directly from disk into the session’s memory (reporting delta).
    type: int
  oracledb.direct_writes:
    description: The number of direct path write operations, where data is written directly to disk from user memory (reporting delta).
    type: int
  oracledb.disk_reads:
    description: The number of physical reads a query performs — that is, the number of data blocks read from disk (reporting delta).
    type: int
  oracledb.duration_sec:
    description: Total time taken by a database query to execute.
    type: double

  oracledb.elapsed_time:
    description: The total time (in seconds) taken by a query from start to finish, including CPU time and all types of waits (reporting delta).
    type: double
  oracledb.enqueue.type:
    description: Type of enqueue (lock) operation reported by Oracle.
    type: string
    enum: [conversions, releases, requests, timeouts, waits]
  oracledb.event:
    description: The specific wait event that a query or session is currently experiencing.
    type: string
  oracledb.executions:
    description: The number of times a specific SQL query has been executed (reporting delta).
    type: int
  oracledb.module:
    description: Logical module name of the client application that initiated a query or session.
    type: string
  oracledb.osuser:
    description: Name of the operating system user that initiated or is running the Oracle database session.
    type: string
  oracledb.parse.result:
    description: Result of a parse operation (e.g., failure).
    type: string
    enum: [failure]
  oracledb.parse.type:
    description: Type of parse operation (e.g., soft).
    type: string
    enum: [soft]
  oracledb.physical_read_bytes:
    description: The total number of bytes read from disk by a query (reporting delta).
    type: int
  oracledb.physical_read_requests:
    description: The number of physical I/O read operations performed by a query (reporting delta).
    type: int
  oracledb.physical_write_bytes:
    description: The total number of bytes written to disk by a query (reporting delta).
    type: int
  oracledb.physical_write_requests:
    description: The number of times a query requested to write data to disk (reporting delta).
    type: int
  oracledb.plan.first_load:
    description: "Time at which the plan was first loaded into the library cache, in the server's local timezone. Format: YYYY-MM-DD/HH:MM:SS"
    type: string
  oracledb.plan.last_load:
    description: "Plan load time in the server's local timezone. Format: YYYY-MM-DD/HH:MM:SS"
    type: string
  oracledb.plan_hash_value:
    description: Binary hash value calculated on the query execution plan and used to identify similar query execution plans, reported in the HEX format.
    type: string
  oracledb.procedure_execution_count:
    description: The number of times the stored procedure has been executed, derived from the minimum statement execution count across all statements in the procedure (reporting delta). Please note, this is best effort and may not be accurate in some scenarios. Use with caution.
    type: int
  oracledb.procedure_id:
    description: The identifier of the stored procedure or function being executed by the query.
    type: int
  oracledb.procedure_name:
    description: Name of the database object that a query is accessing.
    type: string
  oracledb.procedure_type:
    description: Type of the database object that a query is accessing.
    type: string
  oracledb.process:
    description: The operating system process ID (PID) associated with a session.
    type: string
  oracledb.program:
    description: Name of the client program or tool that initiated the Oracle database session.
    type: string
  oracledb.query.started:
    description: "The timestamp when the SQL statement started execution, in ISO 8601 format (UTC)."
    type: string
  oracledb.query.wait_time:
    description: The wait time in seconds. If the session is currently waiting, the value is the time spent waiting in the current wait. Returns 0 if the session is not currently waiting.
    type: double
  oracledb.query_plan:
    description: The query execution plan used by the SQL Server.
    type: string
  oracledb.redo.request.type:
    description: The type of redo log buffer space request.
    type: string
    enum: [log_space]
  oracledb.redo.retry.type:
    description: The type of redo buffer allocation retry.
    type: string
    enum: [buffer_allocation]
  oracledb.redo.type:
    description: The phase of the redo pipeline that a redo time measurement is attributed to.
    type: string
    enum: [write, log_space_wait, sync]
  oracledb.rows_processed:
    description: The total number of rows that a query has read, returned, or affected during its execution (reporting delta).
    type: int
  oracledb.scan.mode:
    description: Execution mode of the scan reported by Oracle.
    type: string
    enum: [direct_read, full, long_tables, rowid_ranges]
  oracledb.scan.type:
    description: Type of scan operation reported by Oracle.
    type: string
    enum: [index_fast_full, table]
  oracledb.schemaname:
    description: Oracle schema under which SQL statements are being executed
    type: string
  oracledb.serial:
    description: Serial number associated with a session.
    type: string
  oracledb.session.duration:
    description: The total time in seconds that the session has been connected.
    type: double
  oracledb.session.started:
    description: "The timestamp when the session logged on, in ISO 8601 format (UTC)."
    type: string
  oracledb.session.type:
    description: Class of session the database time is attributed to.
    type: string
    enum: [foreground]
  oracledb.sid:
    description: ID of the Oracle Server session.
    type: string
  oracledb.sort.type:
    description: Type of sort operation (e.g., memory, disk).
    type: string
    enum: [disk, memory]
  oracledb.sql_id:
    description: The SQL ID of the query.
    type: string
  oracledb.state:
    description: Current state of the query or the session executing it.
    type: string
  oracledb.status:
    description: Execution state or result of a database query or session.
    type: string
  oracledb.user_io_wait_time:
    description: The total time (in seconds) a query spent waiting for user I/O operations—such as reading or writing data to disk or network file systems (reporting delta).
    type: double
  oracledb.wait.count:
    description: Total number of waits for the wait event across all sessions.
    type: int
  oracledb.wait.duration:
    description: Total time waited in seconds for the wait event.
    type: double
  oracledb.wait_class:
    description: The category of wait events a query or session is currently experiencing in Oracle Database.
    type: string
  session_status:
    description: Session status
    type: string
    requirement_level: recommended
  session_type:
    description: Session type
    type: string
    requirement_level: recommended
  tablespace_name:
    description: Tablespace name
    type: string
    requirement_level: recommended
  # attributes for events
  ## top query
  user.name:
    description: Database user name under which a session is connected to
    type: string

events:
  db.server.query_sample:
    enabled: false
    description: sample query
    attributes:
      - db.query.text
      - db.system.name
      - user.name
      - db.namespace
      - oracle.db.service
      - client.address
      - client.port
      - network.peer.address
      - network.peer.port
      - oracledb.plan_hash_value
      - oracledb.sql_id
      - oracledb.child_number
      - oracledb.child_address
      - oracledb.sid
      - oracledb.serial
      - oracledb.process
      - oracledb.schemaname
      - oracledb.program
      - oracledb.module
      - oracledb.status
      - oracledb.state
      - oracledb.wait_class
      - oracledb.event
      - oracledb.query.wait_time
      - oracledb.procedure_id
      - oracledb.procedure_name
      - oracledb.procedure_type
      - oracledb.osuser
      - oracledb.duration_sec
      - db.query.comment_tags
      - oracledb.query.started
      - oracledb.session.started
      - oracledb.session.duration
      - oracledb.blocking.blocker.sid
      - oracledb.blocking.blocker.root_sid
      - oracledb.blocking.blocker.state
      - oracledb.blocking.start_time
      - oracledb.blocking.wait_duration
      - oracledb.blocking.lock.mode
      - oracledb.blocking.lock.type
      - oracledb.blocking.object.owner
      - oracledb.blocking.object.name
  db.server.session.wait_sample:
    enabled: false
    description: Per-session wait event statistics from v$session_event.
    attributes:
      - oracledb.sid
      - oracledb.serial
      - oracledb.event
      - oracledb.wait_class
      - oracledb.wait.count
      - oracledb.wait.duration
  db.server.top_query:
    enabled: false
    description: Collection of event metrics for top N queries, filtered based on the highest CPU time consumed (oracledb.elapsed_time).
    attributes:
      - db.system.name
      - db.server.name
      - db.namespace
      - oracle.db.service
      - db.query.text
      - oracledb.query_plan
      - oracledb.sql_id
      - oracledb.child_number
      - oracledb.child_address
      - oracledb.application_wait_time
      - oracledb.buffer_gets
      - oracledb.cluster_wait_time
      - oracledb.command_type
      - oracledb.concurrency_wait_time
      - oracledb.cpu_time
      - oracledb.direct_reads
      - oracledb.direct_writes
      - oracledb.disk_reads
      - oracledb.elapsed_time
      - oracledb.executions
      - oracledb.physical_read_bytes
      - oracledb.physical_read_requests
      - oracledb.physical_write_bytes
      - oracledb.physical_write_requests
      - oracledb.rows_processed
      - oracledb.user_io_wait_time
      - oracledb.procedure_execution_count
      - oracledb.procedure_id
      - oracledb.procedure_name
      - oracledb.procedure_type
      - db.query.comment_tags
      - oracledb.plan_hash_value
      - oracledb.plan.first_load
      - oracledb.plan.last_load
metrics:
  oracledb.buffer.inspected:
    description: Number of buffers inspected from the end of the LRU queue while a process searched for a reusable buffer, grouped by buffer state.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{buffer}"
    attributes: [oracledb.buffer.state]
  oracledb.buffer.requests:
    description: Number of times a reusable or free buffer was requested to create or load a block.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{request}"
  oracledb.buffer_cache.block.changes:
    description: Number of changes that were part of an update or delete operation made to blocks in the buffer cache.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{change}"
  oracledb.buffer_cache.block.gets:
    description: Number of current-mode block gets satisfied from the buffer cache. Distinct from oracledb.db_block_gets, which counts all current-mode block gets requested regardless of where they are satisfied.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{get}"
  oracledb.buffer_cache.utilization:
    attributes:
      - oracle.db.pdb
    description: Fraction of logical reads served from the buffer cache without physical I/O, as computed by Oracle V$SYSMETRIC (% (LogRead - PhyRead)/LogRead).
    enabled: false
    stability: development
    gauge:
      value_type: double
    unit: "%"
  oracledb.call.count:
    description: Total count of calls issued to the database.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{call}"
    attributes: [oracledb.call.type]
  oracledb.call.recursive.cpu.time:
    description: Total CPU time spent on recursive (internal) calls.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: double
    unit: s
  oracledb.checkpoint.buffers:
    description: Number of buffers written by the Database Writer (DBWR) for checkpoints.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{buffer}"
  oracledb.checkpoint.completed:
    description: Number of checkpoints completed by the Database Writer (DBWR).
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{checkpoint}"
  oracledb.consistent_gets:
    attributes:
      - oracle.db.pdb
    description: Number of times a consistent read was requested for a block from the buffer cache.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{gets}"
  oracledb.cpu_time:
    attributes:
      - oracle.db.pdb
    description: Cumulative CPU time, in seconds
    enabled: true
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: double
    unit: s
  oracledb.cursor.cache.hits:
    description: Total count of session cursor cache hits, where an existing cached cursor is reused to avoid a soft parse.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{hit}"
  oracledb.cursor.cache.size:
    description: Number of cursors currently held in the session cursor cache.
    enabled: false
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{cursor}"
  oracledb.cursor.open:
    description: Number of currently open cursors in the Oracle instance.
    enabled: false
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{cursor}"
  oracledb.data_dictionary.hit_ratio:
    description: Data dictionary cache hit ratio from v$rowcache.
    enabled: false
    stability: development
    gauge:
      value_type: double
    unit: "%"
  oracledb.database.cpu.utilization:
    attributes:
      - oracle.db.pdb
    description: Fraction of total database time spent on CPU, as computed by Oracle V$SYSMETRIC (% Cpu/DB_Time).
    enabled: false
    stability: development
    gauge:
      value_type: double
    unit: "%"
  oracledb.database.wait.utilization:
    attributes:
      - oracle.db.pdb
    description: Fraction of total database time spent waiting on I/O, locks, or latches, as computed by Oracle V$SYSMETRIC (% Wait/DB_Time).
    enabled: false
    stability: development
    gauge:
      value_type: double
    unit: "%"
  oracledb.db.time:
    description: Total wall-clock time spent in database calls.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: double
    unit: s
    attributes: [oracledb.session.type]
  oracledb.db_block_gets:
    attributes:
      - oracle.db.pdb
    description: Number of times a current block was requested from the buffer cache.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{gets}"
  oracledb.ddl_statements_parallelized:
    attributes:
      - oracle.db.pdb
    description: Number of DDL statements that were executed in parallel
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{statements}"
  oracledb.dml_locks.limit:
    description: Maximum limit of active DML (Data Manipulation Language) locks, -1 if unlimited.
    enabled: true
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{locks}"
  oracledb.dml_locks.usage:
    description: Current count of active DML (Data Manipulation Language) locks.
    enabled: true
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{locks}"
  oracledb.dml_statements_parallelized:
    attributes:
      - oracle.db.pdb
    description: Number of DML statements that were executed in parallel
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{statements}"
  oracledb.enqueue.operations:
    description: Total count of enqueue (lock) operations.
    enabled: false
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{operation}"
    attributes: [oracledb.enqueue.type]
  oracledb.enqueue_deadlocks:
    attributes:
      - oracle.db.pdb
    description: Total number of deadlocks between table or row locks in different sessions.
    enabled: true
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
      input_type: string
    unit: "{deadlocks}"
  oracledb.enqueue_locks.limit:
    description: Maximum limit of active enqueue locks, -1 if unlimited.
    enabled: true
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{locks}"
  oracledb.enqueue_locks.usage:
    description: Current count of active enqueue locks.
    enabled: true
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{locks}"
  oracledb.enqueue_resources.limit:
    description: Maximum limit of active enqueue resources, -1 if unlimited.
    enabled: true
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{resources}"
  oracledb.enqueue_resources.usage:
    description: Current count of active enqueue resources.
    enabled: true
    stability: development
    gauge:
      value_type: int
      input_type: string
    unit: "{resources}"
  oracledb.exchange_deadlocks:
    attributes:
      - oracle.db.pdb
    description: Number of times that a process detected a potential deadlock when exchanging two buffers and raised an internal, restartable error. Index scans are the only operations that perform exchanges.
    enabled: true
    stability: development
    sum:
      aggregation_temporality: cumulative
      monotonic: true
      value_type: int
