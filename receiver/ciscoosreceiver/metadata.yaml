type: ciscoosreceiver

status:
  class: receiver
  stability:
    development: [metrics]
  distributions: []
  codeowners:
    active: [dmitryax]

resource_attributes:
  cisco.device.ip:
    description: IP address of the Cisco device
    type: string
    enabled: true
  cisco.device.model:
    description: Model of the Cisco device
    type: string
    enabled: true
  cisco.device.name:
    description: Name of the Cisco device
    type: string
    enabled: true

metrics:
  cisco.system.cpu.utilization:
    description: CPU utilization as a fraction
    unit: "1"
    gauge:
      value_type: double
    enabled: true
  cisco.system.memory.utilization:
    description: Memory utilization as a fraction
    unit: "1"
    gauge:
      value_type: double
    enabled: true
  cisco.device.up:
    enabled: true
    description: Device availability (1 = up, 0 = down)
    unit: "1"
    gauge:
      value_type: int
    attributes: [target]
  cisco.collector.duration.seconds:
    enabled: true
    description: Duration of all collector scrapes for one target (total collection time)
    unit: s
    gauge:
      value_type: double
    attributes: [target]

attributes:
  target:
    description: The target network device hostname/IP
    type: string

tests:
  config:
    collection_interval: 30s
    initial_delay: 1s
    timeout: 45s
    devices:
      - device:
          host:
            ip: "192.168.1.1"
            port: 22
        auth:
          username: "admin"
          password: "password"
    scrapers:
      system:
