default:
all_set:
  metrics:
    system.network.errors:
      enabled: true
      attributes: ["network.io.direction","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.interface.status:
      enabled: true
      attributes: ["network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.io:
      enabled: true
      attributes: ["network.io.direction","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.packet.count:
      enabled: true
      attributes: ["network.packet.type","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.packet.dropped:
      enabled: true
      attributes: ["network.io.direction","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
  resource_attributes:
    host.ip:
      enabled: true
    hw.type:
      enabled: true
    os.name:
      enabled: true
reaggregate_set:
  metrics:
    system.network.errors:
      enabled: true
      attributes: []
    system.network.interface.status:
      enabled: true
      attributes: []
    system.network.io:
      enabled: true
      attributes: []
    system.network.packet.count:
      enabled: true
      attributes: []
    system.network.packet.dropped:
      enabled: true
      attributes: []
  resource_attributes:
    host.ip:
      enabled: true
    hw.type:
      enabled: true
    os.name:
      enabled: true
none_set:
  metrics:
    system.network.errors:
      enabled: false
      attributes: ["network.io.direction","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.interface.status:
      enabled: false
      attributes: ["network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.io:
      enabled: false
      attributes: ["network.io.direction","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.packet.count:
      enabled: false
      attributes: ["network.packet.type","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
    system.network.packet.dropped:
      enabled: false
      attributes: ["network.io.direction","network.interface.description","network.interface.mac","network.interface.name","network.interface.speed"]
  resource_attributes:
    host.ip:
      enabled: false
    hw.type:
      enabled: false
    os.name:
      enabled: false
filter_set_include:
  resource_attributes:
    host.ip:
      enabled: true
      metrics_include:
        - regexp: ".*"
    hw.type:
      enabled: true
      metrics_include:
        - regexp: ".*"
    os.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    host.ip:
      enabled: true
      metrics_exclude:
        - strict: "host.ip-val"
    hw.type:
      enabled: true
      metrics_exclude:
        - strict: "hw.type-val"
    os.name:
      enabled: true
      metrics_exclude:
        - strict: "os.name-val"
