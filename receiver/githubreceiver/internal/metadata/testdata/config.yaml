default:
all_set:
  metrics:
    vcs.change.count:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.change.state","vcs.repository.name"]
    vcs.change.duration:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.change.state"]
    vcs.change.time_to_approval:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name"]
    vcs.change.time_to_merge:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name"]
    vcs.contributor.count:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name"]
    vcs.ref.count:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.type"]
    vcs.ref.lines_delta:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.ref.head.type","vcs.ref.base.name","vcs.ref.base.type","vcs.line_change.type"]
    vcs.ref.revisions_delta:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.ref.head.type","vcs.ref.base.name","vcs.ref.base.type","vcs.revision_delta.direction"]
    vcs.ref.time:
      enabled: true
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.ref.head.type"]
    vcs.repository.count:
      enabled: true
  resource_attributes:
    vcs.owner.name:
      enabled: true
    vcs.provider.name:
      enabled: true
reaggregate_set:
  metrics:
    vcs.change.count:
      enabled: true
      attributes: []
    vcs.change.duration:
      enabled: true
      attributes: []
    vcs.change.time_to_approval:
      enabled: true
      attributes: []
    vcs.change.time_to_merge:
      enabled: true
      attributes: []
    vcs.contributor.count:
      enabled: true
      attributes: []
    vcs.ref.count:
      enabled: true
      attributes: []
    vcs.ref.lines_delta:
      enabled: true
      attributes: []
    vcs.ref.revisions_delta:
      enabled: true
      attributes: []
    vcs.ref.time:
      enabled: true
      attributes: []
    vcs.repository.count:
      enabled: true
  resource_attributes:
    vcs.owner.name:
      enabled: true
    vcs.provider.name:
      enabled: true
none_set:
  metrics:
    vcs.change.count:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.change.state","vcs.repository.name"]
    vcs.change.duration:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.change.state"]
    vcs.change.time_to_approval:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name"]
    vcs.change.time_to_merge:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name"]
    vcs.contributor.count:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name"]
    vcs.ref.count:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.type"]
    vcs.ref.lines_delta:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.ref.head.type","vcs.ref.base.name","vcs.ref.base.type","vcs.line_change.type"]
    vcs.ref.revisions_delta:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.ref.head.type","vcs.ref.base.name","vcs.ref.base.type","vcs.revision_delta.direction"]
    vcs.ref.time:
      enabled: false
      attributes: ["vcs.repository.url.full","vcs.repository.name","vcs.ref.head.name","vcs.ref.head.type"]
    vcs.repository.count:
      enabled: false
  resource_attributes:
    vcs.owner.name:
      enabled: false
    vcs.provider.name:
      enabled: false
filter_set_include:
  resource_attributes:
    vcs.owner.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    vcs.provider.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    vcs.owner.name:
      enabled: true
      metrics_exclude:
        - strict: "vcs.owner.name-val"
    vcs.provider.name:
      enabled: true
      metrics_exclude:
        - strict: "vcs.provider.name-val"
