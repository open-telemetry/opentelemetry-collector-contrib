display_name: Receiver Creator
type: receiver_creator

description: |
  This receiver can instantiate other receivers at runtime based on whether observed endpoints match a configured rule.

status:
  class: receiver
  stability:
    beta: [metrics]
    alpha: [logs, traces]
  distributions: [contrib, k8s]
  codeowners:
    active: [dmitryax, ChrsMark]
    emeritus: [rmfitzpatrick]

tests:
  config:
    endpoint: myendpoint:12345
  goleak:
    ignore:
      top:
        - "github.com/SAP/go-hdb/driver.(*metrics).collect"
