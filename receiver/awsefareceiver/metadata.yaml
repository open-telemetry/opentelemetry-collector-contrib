type: awsefareceiver

status:
  class: receiver
  stability:
    beta: [metrics]
  distributions: []
  codeowners:
    active: [mitali-salvi, jefchien, sky333999]

attributes:
  aws.efa.device:
    description: The EFA InfiniBand device name (e.g. efa_0)
    type: string
  aws.efa.eni.id:
    description: The Elastic Network Interface ID associated with the EFA device
    type: string
  aws.efa.port:
    description: The EFA port number
    type: string

metrics:
  efa_impaired_remote_conn_events:
    description: The number of times EFA SRD connections entered an impaired state resulting in a reduced throughput rate limit
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_read_bytes:
    description: The number of bytes received using RDMA read operations
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_read_resp_bytes:
    description: The number of bytes sent in RDMA read response
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_read_wr_err:
    description: The number of RDMA read work request errors
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_read_wrs:
    description: The number of RDMA read work requests completed
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_write_bytes:
    description: The number of bytes written by other instances using RDMA write operations
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_write_recv_bytes:
    description: The number of bytes received by RDMA write operations
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_write_wr_err:
    description: The number of RDMA write work request errors
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rdma_write_wrs:
    description: The number of RDMA write work requests completed
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_recv_bytes:
    description: The number of bytes received via recv operations
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_recv_wrs:
    description: The number of receive work requests completed
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_retrans_bytes:
    description: The number of EFA SRD bytes retransmitted
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_retrans_pkts:
    description: The number of EFA SRD packets retransmitted
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_retrans_timeout_events:
    description: The number of times EFA SRD traffic timed out and resulted in a network path change
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
