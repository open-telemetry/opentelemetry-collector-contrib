    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rx_dropped:
    description: The number of packets that were received and then dropped
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_rx_pkts:
    description: The number of packets received
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_send_bytes:
    description: The number of bytes sent via send operations
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_send_wrs:
    description: The number of send work requests completed
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "1"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_tx_bytes:
    description: The number of bytes transmitted
    stability: beta
    enabled: true
    sum:
      monotonic: true
      aggregation_temporality: cumulative
      value_type: int
    unit: "By"
    attributes: [aws.efa.device, aws.efa.port, aws.efa.eni.id]
  efa_tx_pkts:
