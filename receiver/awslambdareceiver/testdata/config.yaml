awslambda/aws_logs_encoding:
  s3:
    encoding: aws_logs_encoding
  cloudwatch:
    encoding: aws_logs_encoding

awslambda/json_log_encoding:
  s3:
    encoding: json_log_encoding

awslambda/empty_encoding:

awslambda/with_failure_arn:
  failure_bucket_arn: arn:aws:s3:::example

awslambda/s3_multi_encoding:
  s3:
    encodings:
      - name: vpcflow
        encoding: awslogs_encoding/vpcflow
      - name: cloudtrail
        encoding: awslogs_encoding/cloudtrail
      - name: catchall
        path_pattern: "*"
awslambda/cw_multi_encoding:
  cloudwatch:
    encodings:
      - name: vpcflow
        encoding: awslogs_encoding/vpc
      - name: lambda
        encoding: awslogs_encoding/lambda
        log_group_pattern: "/aws/lambda/*"
      - name: raw
        log_group_pattern: "*"
