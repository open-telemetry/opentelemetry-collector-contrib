receivers:
  tcp_check:
    endpoint: localhost:80
    collection_interval: 60s
exporters:
  # NOTE: Prior to v0.86.0 use `logging` instead of `debug`.
  debug:
    verbosity: detailed
service:
  pipelines:
    traces:
      receivers: [tcp_check]
      exporters: [debug]
  telemetry:
    logs:
      level: debug