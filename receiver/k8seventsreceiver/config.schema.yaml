description: Config defines configuration for kubernetes events receiver.
type: object
properties:
  exclude_namespaces:
    description: ExcludeNamespaces lists namespaces whose events should be skipped. Each entry is a filter.Config matched against the namespace name; the receiver lists the cluster's namespaces at startup, drops the ones that match, and watches only the survivors. Cannot be combined with Namespaces.
    type: array
    items:
      $ref: go.opentelemetry.io/collector/filter.config
  k8s_leader_elector:
    x-pointer: true
    type: string
    x-customType: go.opentelemetry.io/collector/component.ID
  namespaces:
    description: List of ‘namespaces’ to collect events from.
    type: array
    items:
      type: string
  storage:
    description: Storage is the ID of the storage extension to use for resource version persistence. When set, the receiver will persist the latest resource version and resume from it on restart, preventing duplicate events. Only valid for watch mode (which is the only mode this receiver uses).
    x-pointer: true
    type: string
    x-customType: go.opentelemetry.io/collector/component.ID
allOf:
  - $ref: /internal/k8sconfig.api_config
