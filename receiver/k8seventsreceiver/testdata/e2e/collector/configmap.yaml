apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Name }}-config
  namespace: default
data:
  relay: |
    exporters:
      otlp_grpc:
        endpoint: {{ .HostEndpoint }}:4317
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      k8s_events:
        auth_type: serviceAccount
        namespaces: [{{ .Namespace }}]
        {{- if .DedupInterval }}
        dedup_interval: {{ .DedupInterval }}
        {{- end }}
    service:
      {{- if .ExportInternalMetrics }}
      telemetry:
        metrics:
          readers:
            - periodic:
                interval: 1000
                exporter:
                  otlp:
                    protocol: grpc
                    endpoint: {{ .HostEndpoint }}:4317
                    insecure: true
      {{- end }}
      extensions:
      - health_check
      pipelines:
        logs:
          exporters:
          - otlp_grpc
          receivers:
          - k8s_events
