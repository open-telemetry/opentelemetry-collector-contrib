$defs:
  autodiscover_config:
    description: AutodiscoverConfig is the configuration for the autodiscovery functionality of log groups
    type: object
    properties:
      account_identifiers:
        type: array
        items:
          type: string
      include_linked_accounts:
        x-pointer: true
        type: boolean
      limit:
        type: integer
      pattern:
        type: string
      prefix:
        type: string
      streams:
        $ref: stream_config
  group_config:
    description: GroupConfig is the configuration for log group collection
    type: object
    properties:
      autodiscover:
        x-pointer: true
        $ref: autodiscover_config
      named:
        type: object
        additionalProperties:
          $ref: stream_config
  logs_config:
    description: LogsConfig is the configuration for the logs portion of this receiver
    type: object
    properties:
      groups:
        $ref: group_config
      max_events_per_request:
        type: integer
      poll_interval:
        type: string
        format: duration
      start_from:
        type: string
  metric_query:
    description: MetricQuery defines a single CloudWatch metric to scrape via GetMetricData.
    type: object
    properties:
      dimensions:
        type: object
        additionalProperties:
          type: string
      metric_name:
        type: string
      namespace:
        type: string
      stat:
        type: string
  metrics_config:
    description: MetricsConfig is the configuration for the metrics (GetMetricData) portion of this receiver. Either Metrics (explicit list) or Discovery (ListMetrics-based) may be set, not both. Collection interval and scraper behavior are controlled via the embedded ControllerConfig.
    type: object
    properties:
      delay:
        description: Delay shifts the query window back from now to account for CloudWatch metric publication latency. CloudWatch metrics are typically available within 3–10 minutes of being recorded. Defaults to 10m.
        type: string
        format: duration
      discovery:
        x-pointer: true
        $ref: metrics_discovery_config
      metrics:
        type: array
        items:
          $ref: metric_query
      period:
        description: Period is the CloudWatch statistics aggregation window. Defaults to 5m.
        type: string
        format: duration
    allOf:
      - $ref: go.opentelemetry.io/collector/scraper/scraperhelper.controller_config
  metrics_discovery_config:
    description: MetricsDiscoveryConfig configures automatic discovery of metrics via ListMetrics. Discovered metrics are then scraped with GetMetricData. Mutually exclusive with metrics (explicit list).
    type: object
    properties:
      limit:
        type: integer
      metric_name:
        type: string
      namespace:
        type: string
      stat:
        type: string
  stream_config:
    description: StreamConfig represents the configuration for the log stream filtering
    type: object
    properties:
      names:
        type: array
        items:
          x-pointer: true
          type: string
      prefixes:
        type: array
        items:
          x-pointer: true
          type: string
description: Config is the overall config structure for the awscloudwatchreceiver
type: object
properties:
  imds_endpoint:
    type: string
  logs:
    $ref: logs_config
  metrics:
    $ref: metrics_config
  profile:
    type: string
  region:
    type: string
  storage:
    x-pointer: true
    type: string
    x-customType: go.opentelemetry.io/collector/component.ID
