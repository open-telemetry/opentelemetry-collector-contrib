aws_cloudwatch/default:
  region: us-west-1
  logs:
    poll_interval: 1m

aws_cloudwatch/initial-lookback:
  region: us-west-1
  logs:
    poll_interval: 1m
    initial_lookback: 1h

aws_cloudwatch/prefix-log-group-autodiscover:
  region: us-west-1
  logs:
    poll_interval: 1m
    groups:
      autodiscover:
        limit: 100
        prefix: /aws/eks/

aws_cloudwatch/name-pattern-log-group-autodiscover:
  region: us-west-1
  logs:
    poll_interval: 1m
    groups:
      autodiscover:
        limit: 100
        pattern: eks

aws_cloudwatch/autodiscover-filter-streams:
  region: us-west-1
  logs:
    poll_interval: 1m
    groups:
      autodiscover:
        limit: 100
        streams:
          prefixes: [kube-api-controller]

aws_cloudwatch/named-prefix-with-streams:
  profile: "my-profile"
  region: us-west-1
  logs:
    poll_interval: 5m
    groups:
      named:
        /aws/eks/dev-0/cluster:
          names: [kube-apiserver-ea9c831555adca1815ae04b87661klasdj]

aws_cloudwatch/named-prefix:
  profile: "my-profile"
  region: us-west-1
  logs:
    poll_interval: 5m
    groups:
      named:
        /aws/eks/dev-0/cluster:

aws_cloudwatch/metrics-explicit:
  region: us-east-1
  metrics:
    collection_interval: 1m
    period: 60s
    queries:
      - namespace: AWS/EC2
        metric_name: CPUUtilization
        dimensions:
          InstanceId: i-1234567890abcdef0
      - namespace: AWS/EC2
        metric_name: NetworkIn

aws_cloudwatch/metrics-explicit-gauge:
  region: us-east-1
  metrics:
    collection_interval: 1m
    period: 60s
    queries:
      - namespace: AWS/EC2
        metric_name: CPUUtilization
        stats: [Average, p99]

aws_cloudwatch/metrics-discovery:
  region: us-east-1
  metrics:
    collection_interval: 5m
    period: 300s
    discovery:
      filters:
        namespace: AWS/EC2
      limit: 200

aws_cloudwatch/metrics-discovery-gauge:
  region: us-east-1
  metrics:
    collection_interval: 5m
    period: 300s
    discovery:
      filters:
        namespace: AWS/EC2
      limit: 100
      stats: [Sum, Average]
      recently_active: true

aws_cloudwatch/metrics-discovery-no-namespace:
  region: us-west-2
  metrics:
    collection_interval: 2m
    period: 120s
    discovery:
      limit: 50
