awscloudwatch/default:
  region: us-west-1
  logs:
    poll_interval: 1m

awscloudwatch/prefix-log-group-autodiscover:
  region: us-west-1
  logs:
    poll_interval: 1m
    groups:
      autodiscover:
        limit: 100
        prefix: /aws/eks/

awscloudwatch/name-pattern-log-group-autodiscover:
  region: us-west-1
  logs:
    poll_interval: 1m
    groups:
      autodiscover:
        limit: 100
        pattern: eks

awscloudwatch/autodiscover-filter-streams:
  region: us-west-1
  logs:
    poll_interval: 1m
    groups:
      autodiscover:
        limit: 100
        streams:
          prefixes: [kube-api-controller]

awscloudwatch/named-prefix-with-streams:
  profile: "my-profile"
  region: us-west-1
  logs:
    poll_interval: 5m
    groups:
      named:
        /aws/eks/dev-0/cluster:
          names: [kube-apiserver-ea9c831555adca1815ae04b87661klasdj]

awscloudwatch/named-prefix:
  profile: 'my-profile'
  region: us-west-1
  logs:
    poll_interval: 5m
    groups:
      named:
        /aws/eks/dev-0/cluster:

awscloudwatch/metrics-explicit:
  region: us-east-1
  metrics:
    collection_interval: 1m
    period: 60s
    queries:
      - namespace: AWS/EC2
        metric_name: CPUUtilization
        dimensions:
          InstanceId: i-1234567890abcdef0
      - namespace: AWS/EC2
        metric_name: NetworkIn

awscloudwatch/metrics-explicit-gauge:
  region: us-east-1
  metrics:
    collection_interval: 1m
    period: 60s
    queries:
      - namespace: AWS/EC2
        metric_name: CPUUtilization
        stats: [Average, p99]

awscloudwatch/metrics-discovery:
  region: us-east-1
  metrics:
    collection_interval: 5m
    period: 300s
    discovery:
      filters:
        namespace: AWS/EC2
      limit: 200

awscloudwatch/metrics-discovery-gauge:
  region: us-east-1
  metrics:
    collection_interval: 5m
    period: 300s
    discovery:
      filters:
        namespace: AWS/EC2
      limit: 100
      stats: [Sum, Average]

awscloudwatch/metrics-discovery-no-namespace:
  region: us-west-2
  metrics:
    collection_interval: 2m
    period: 120s
    discovery:
      limit: 50
