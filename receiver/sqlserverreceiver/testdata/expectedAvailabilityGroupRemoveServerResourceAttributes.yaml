resourceMetrics:
  - resource:
      attributes:
        - key: host.name
          value:
            stringValue: 0.0.0.0
        - key: service.instance.id
          value:
            stringValue: 0.0.0.0:1433
        - key: sqlserver.instance.name
          value:
            stringValue: sql-node-01
    scopeMetrics:
      - metrics:
          - description: Rate of log data received by the availability group replica from the primary.
            gauge:
              dataPoints:
                - asDouble: 256
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: InventoryDB
                    - key: replica.direction
                      value:
                        stringValue: receive
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 0
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: replica.direction
                      value:
                        stringValue: receive
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-01
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 512
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: replica.direction
                      value:
                        stringValue: receive
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.log_data.io.rate
            unit: KB/s
          - description: Total flow control time experienced by the availability group database replica, derived from secondary replica lag.
            gauge:
              dataPoints:
                - asDouble: 2
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: InventoryDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 5
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.replica.flow_control.time
            unit: s
          - description: Amount of log data queued in the availability group replica pipeline.
            gauge:
              dataPoints:
                - asInt: "512"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: InventoryDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                    - key: sqlserver.replica.queue.type
                      value:
                        stringValue: send
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-01
                    - key: sqlserver.replica.queue.type
                      value:
                        stringValue: send
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "1024"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                    - key: sqlserver.replica.queue.type
                      value:
                        stringValue: send
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "1024"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: InventoryDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                    - key: sqlserver.replica.queue.type
                      value:
                        stringValue: redo
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-01
                    - key: sqlserver.replica.queue.type
                      value:
                        stringValue: redo
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "2048"
                  attributes:
                    - key: db.namespace
                      value:
                        stringValue: SalesDB
                    - key: sqlserver.availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: sqlserver.replica.name
                      value:
                        stringValue: sql-node-02
                    - key: sqlserver.replica.queue.type
                      value:
                        stringValue: redo
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.replica.queue.size
            unit: KB
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlserverreceiver
          version: latest
