                        stringValue: system_lookup
                    - key: sqlserver.database.name
                      value:
                        stringValue: AdventureWorks
                    - key: sqlserver.index.id
                      value:
                        stringValue: "2"
                    - key: sqlserver.table.name
                      value:
                        stringValue: Orders
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
