resourceMetrics:
  - resource:
      attributes:
        - key: host.name
          value:
            stringValue: 0.0.0.0
        - key: server.address
          value:
            stringValue: 0.0.0.0
        - key: server.port
          value:
            intValue: "1433"
        - key: service.instance.id
          value:
            stringValue: 0.0.0.0:1433
        - key: sqlserver.instance.name
          value:
            stringValue: sql-node-01
    scopeMetrics:
      - metrics:
          - description: Total flow control time experienced by the availability group database replica, derived from secondary replica lag.
            gauge:
              dataPoints:
                - asDouble: 2000
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: InventoryDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 5000
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.availability_group.flow_control_time
            unit: ms
          - description: Rate at which log blocks are received by the availability group database replica from the primary replica.
            gauge:
              dataPoints:
                - asDouble: 262144
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: InventoryDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 0
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-01
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 524288
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.availability_group.log.received.rate
            unit: By/s
          - description: Amount of log records in the log files of the primary database that have not been sent to the secondary replicas.
            gauge:
              dataPoints:
                - asInt: "512"
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: InventoryDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-01
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "1024"
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.availability_group.log.send_queue
            unit: KB
          - description: Rate at which log records are being redone on the secondary replica.
            gauge:
              dataPoints:
                - asDouble: 128
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: InventoryDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 0
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-01
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asDouble: 256
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.availability_group.redo.rate
            unit: KB/s
          - description: Amount of log records in the log files of the secondary replica that have not yet been redone.
            gauge:
              dataPoints:
                - asInt: "1024"
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: InventoryDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-01
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "2048"
                  attributes:
                    - key: availability_group.database.name
                      value:
                        stringValue: SalesDB
                    - key: availability_group.name
                      value:
                        stringValue: AG_Primary
                    - key: availability_group.replica.name
                      value:
                        stringValue: sql-node-02
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.availability_group.redo_queue
            unit: KB
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlserverreceiver
          version: latest
