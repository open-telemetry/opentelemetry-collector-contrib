resourceMetrics:
  - resource:
      attributes:
        - key: host.name
          value:
            stringValue: 0.0.0.0
        - key: server.address
          value:
            stringValue: 0.0.0.0
        - key: server.port
          value:
            intValue: "1433"
        - key: service.instance.id
          value:
            stringValue: 0.0.0.0:1433
        - key: sqlserver.instance.name
          value:
            stringValue: SERVER1
    scopeMetrics:
      - metrics:
          - description: Maximum amount of memory SQL Server is willing to use (target server memory).
            gauge:
              dataPoints:
                - asInt: "17179869184"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.memory.target
            unit: By
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlserverreceiver
          version: latest
