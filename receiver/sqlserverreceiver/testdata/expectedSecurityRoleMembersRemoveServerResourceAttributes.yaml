resourceMetrics:
  - resource:
      attributes:
        - key: host.name
          value:
            stringValue: 0.0.0.0
        - key: service.instance.id
          value:
            stringValue: 0.0.0.0:1433
        - key: sqlserver.instance.name
          value:
            stringValue: SERVER1
    scopeMetrics:
      - metrics:
          - description: Number of members in a server role.
            gauge:
              dataPoints:
                - asInt: "5"
                  attributes:
                    - key: role
                      value:
                        stringValue: sysadmin
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.server.security.role_membership.count
            unit: '{members}'
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlserverreceiver
          version: latest
