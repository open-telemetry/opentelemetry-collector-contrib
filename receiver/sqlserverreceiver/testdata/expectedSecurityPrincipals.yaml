resourceMetrics:
  - resource:
      attributes:
        - key: host.name
          value:
            stringValue: 0.0.0.0
        - key: server.address
          value:
            stringValue: 0.0.0.0
        - key: server.port
          value:
            intValue: "1433"
        - key: service.instance.id
          value:
            stringValue: 0.0.0.0:1433
        - key: sqlserver.instance.name
          value:
            stringValue: SERVER1
    scopeMetrics:
      - metrics:
          - description: Number of security principals (logins, users) at the server level.
            gauge:
              dataPoints:
                - asInt: "45"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: sqlserver.server.security.principal.count
            unit: '{principals}'
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/sqlserverreceiver
          version: latest
