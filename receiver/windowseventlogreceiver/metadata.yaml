display_name: Windows Event Log Receiver
type: windowseventlog

description: |
  This receiver tails and parses logs from windows event log API using the
  [opentelemetry-log-collection](https://github.com/open-telemetry/opentelemetry-log-collection) library.

status:
  class: receiver
  stability:
    alpha: [logs]
  distributions: [contrib]
  codeowners:
    active: [armstrmi, pjanotti]
  unsupported_platforms: [darwin, linux]

tests:
  config:
    start_at: end
    channel: application

feature_gates:
  - id: domainControllers.autodiscovery
    stage: alpha
    description: >-
      When enabled and is remote automatically discover domain controllers through joined controllers and 
      start collecting logs from specified channel.
    from_version: v0.150.0
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/44156