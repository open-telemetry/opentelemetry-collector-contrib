kafkametrics/invalid_franz:
  brokers: 10.10.10.10:9092
  metadata:
    refresh_interval: 2h

kafkametrics:
  cluster_alias: kafka-test
  brokers: 10.10.10.10:9092
  scrapers:
    - brokers
    - topics
    - consumers
  metadata:
    # Set a non-default value in metadata to ensure
    # the refresh_frequency -> refresh_interval alias
    # does not destroy any other config.
    full: false
  refresh_frequency: 10s
  topic_match: test_\w+
  group_match: test_\w+
