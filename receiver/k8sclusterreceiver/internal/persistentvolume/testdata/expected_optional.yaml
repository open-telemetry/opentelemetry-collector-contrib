resourceMetrics:
  - resource:
      attributes:
        - key: k8s.persistentvolume.name
          value:
            stringValue: test-pv-1
        - key: k8s.persistentvolume.reclaim_policy
          value:
            stringValue: Retain
        - key: k8s.persistentvolume.uid
          value:
            stringValue: test-pv-1-uid
        - key: k8s.storageclass.name
          value:
            stringValue: standard
      entityRefs:
        - descriptionKeys:
            - k8s.persistentvolume.name
            - k8s.storageclass.name
            - k8s.persistentvolume.reclaim_policy
          idKeys:
            - k8s.persistentvolume.uid
          type: k8s.persistentvolume
    schemaUrl: https://opentelemetry.io/schemas/1.18.0
    scopeMetrics:
      - metrics:
          - description: The current phase of the PersistentVolume (1 for the current phase, 0 for others).
            name: k8s.persistentvolume.status.phase
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  attributes:
                    - key: k8s.persistentvolume.status.phase
                      value:
                        stringValue: Available
                  startTimeUnixNano: "2000000"
                  timeUnixNano: "1000000"
                - asInt: "1"
                  attributes:
                    - key: k8s.persistentvolume.status.phase
                      value:
                        stringValue: Bound
                  startTimeUnixNano: "2000000"
                  timeUnixNano: "1000000"
                - asInt: "0"
                  attributes:
                    - key: k8s.persistentvolume.status.phase
                      value:
                        stringValue: Failed
                  startTimeUnixNano: "2000000"
                  timeUnixNano: "1000000"
                - asInt: "0"
                  attributes:
                    - key: k8s.persistentvolume.status.phase
                      value:
                        stringValue: Pending
                  startTimeUnixNano: "2000000"
                  timeUnixNano: "1000000"
                - asInt: "0"
                  attributes:
                    - key: k8s.persistentvolume.status.phase
                      value:
                        stringValue: Released
                  startTimeUnixNano: "2000000"
                  timeUnixNano: "1000000"
            unit: '{persistentvolume}'
          - description: The storage capacity of the PersistentVolume.
            name: k8s.persistentvolume.storage.capacity
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "10737418240"
                  startTimeUnixNano: "2000000"
                  timeUnixNano: "1000000"
            unit: By
        scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/k8sclusterreceiver
          version: latest
