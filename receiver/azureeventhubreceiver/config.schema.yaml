$defs:
  blob_checkpoint_store_config:
    description: BlobCheckpointStoreConfig defines the configuration for Azure Blob Storage based checkpoint coordination used in distributed consumption mode.
    type: object
    properties:
      connection:
        description: Connection is the connection string for Azure Blob Storage. Required when the parent config does not use auth.
        type: string
      container_name:
        description: ContainerName is the blob container used for checkpoint data. Required.
        type: string
      storage_account_url:
        description: StorageAccountURL is the blob service URL (e.g., https://myaccount.blob.core.windows.net). Required when the parent config uses auth.
        type: string
  event_hub_config:
    description: EventHubConfig defines the configuration for an Azure Event Hub when using authentication.
    type: object
    properties:
      name:
        description: Name is the name of the Event Hub.
        type: string
      namespace:
        description: Namespace is the fully qualified namespace of the Event Hub.
        type: string
  time_format:
    type: object
    properties:
      logs:
        type: array
        items:
          type: string
      metrics:
        type: array
        items:
          type: string
      traces:
        type: array
        items:
          type: string
type: object
properties:
  apply_semantic_conventions:
    type: boolean
  auth:
    x-pointer: true
    type: string
    x-customType: go.opentelemetry.io/collector/component.ID
  blob_checkpoint_store:
    description: BlobCheckpointStore enables distributed consumption using Azure Blob Storage for checkpoint coordination. When configured, the receiver uses the Azure SDK Processor for dynamic partition assignment across multiple collector instances.
    x-pointer: true
    $ref: blob_checkpoint_store_config
  connection:
    type: string
  event_hub:
    $ref: event_hub_config
  format:
    type: string
  group:
    type: string
  max_poll_events:
    type: integer
  metric_aggregation:
    type: string
  offset:
    type: string
  partition:
    type: string
  poll_rate:
    description: azeventhub lib specific
    type: integer
  prefetch_count:
    description: PrefetchCount controls the size of the SDK's internal prefetch buffer per partition. The SDK uses this value to maintain an asynchronous cache of events so that ReceiveEvents calls return from a local buffer rather than waiting on the network. 0  - use the SDK default (300) <0  - disable prefetch >0  - use the explicit value
    type: integer
    x-customType: int32
  storage:
    x-pointer: true
    type: string
    x-customType: go.opentelemetry.io/collector/component.ID
  time_formats:
    $ref: time_format
