$defs:
  metric_config:
    type: object
    properties:
      metric_descriptor_filter:
        description: Filter for listing metric descriptors. Only support `project` and `metric.type` as filter objects. See https://cloud.google.com/monitoring/api/v3/filters#metric-descriptor-filter for more details.
        type: string
      metric_name:
        type: string
type: object
properties:
  default_ingest_delay:
    description: DefaultIngestDelay is used when a metric descriptor does not report Metadata.IngestDelay (typical for user log-based, custom, and external Prometheus metrics). Default 60s preserves the prior hardcoded fallback.
    type: string
    format: duration
  endpoint:
    description: Overrides the default monitoring.googleapis.com:443 endpoint. Use this when targeting non-standard universe domains.
    type: string
  metrics_list:
    type: array
    items:
      $ref: metric_config
  project_id:
    type: string
allOf:
  - $ref: go.opentelemetry.io/collector/scraper/scraperhelper.controller_config
