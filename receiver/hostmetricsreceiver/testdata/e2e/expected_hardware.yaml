resourceMetrics:
  - resource:
      attributes: []
    schemaUrl: https://opentelemetry.io/schemas/1.9.0
    scopeMetrics:
      - scope:
          name: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/hostmetricsreceiver/internal/scraper/hardwarescraper
          version: latest
        metrics:
          - name: hw.temperature
            description: Temperature in degrees Celsius.
            unit: Cel
            gauge:
              dataPoints:
                - asDouble: 55
                  attributes:
                    - key: id
                      value:
                        stringValue: nvme_hwmon0_temp1
                    - key: name
                      value:
                        stringValue: Composite
                    - key: parent
                      value:
                        stringValue: nvme_hwmon0
                    - key: sensor_location
                      value:
                        stringValue: NVME_HWMON0_TEMP1
                - asDouble: 72
                  attributes:
                    - key: id
                      value:
                        stringValue: amdgpu_hwmon1_temp1
                    - key: name
                      value:
                        stringValue: edge
                    - key: parent
                      value:
                        stringValue: amdgpu_hwmon1
                    - key: sensor_location
                      value:
                        stringValue: AMDGPU_HWMON1_TEMP1
          - name: hw.temperature.limit
            description: Temperature limit in degrees Celsius.
            unit: Cel
            gauge:
              dataPoints:
                - asDouble: 100
                  attributes:
                    - key: id
                      value:
                        stringValue: nvme_hwmon0_temp1
                    - key: limit_type
                      value:
                        stringValue: high.critical
                    - key: name
                      value:
                        stringValue: Composite
                    - key: parent
                      value:
                        stringValue: nvme_hwmon0
                    - key: sensor_location
                      value:
                        stringValue: NVME_HWMON0_TEMP1
                - asDouble: 85
                  attributes:
                    - key: id
                      value:
                        stringValue: nvme_hwmon0_temp1
                    - key: limit_type
                      value:
                        stringValue: high.degraded
                    - key: name
                      value:
                        stringValue: Composite
                    - key: parent
                      value:
                        stringValue: nvme_hwmon0
                    - key: sensor_location
                      value:
                        stringValue: NVME_HWMON0_TEMP1
                - asDouble: 95
                  attributes:
                    - key: id
                      value:
                        stringValue: amdgpu_hwmon1_temp1
                    - key: limit_type
                      value:
                        stringValue: high.critical
                    - key: name
                      value:
                        stringValue: edge
                    - key: parent
                      value:
                        stringValue: amdgpu_hwmon1
                    - key: sensor_location
                      value:
                        stringValue: AMDGPU_HWMON1_TEMP1