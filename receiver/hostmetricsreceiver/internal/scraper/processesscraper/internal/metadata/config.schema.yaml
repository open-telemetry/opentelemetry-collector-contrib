$defs:
  attribute_status:
    description: AttributeStatus specifies the value status attribute.
    type: integer
  metric_config:
    description: MetricConfig provides common config for a particular metric.
    type: object
    properties:
      aggregation_strategy:
        type: string
      attributes:
        type: array
        items:
          type: string
      enabled:
        type: boolean
  metrics_builder_config:
    description: MetricsBuilderConfig is a configuration for processes metrics builder.
    type: object
    properties:
      metrics:
        $ref: metrics_config
  metrics_config:
    description: MetricsConfig provides config for processes metrics.
    type: object
    properties:
      system.processes.count:
        $ref: metric_config
      system.processes.created:
        $ref: metric_config
