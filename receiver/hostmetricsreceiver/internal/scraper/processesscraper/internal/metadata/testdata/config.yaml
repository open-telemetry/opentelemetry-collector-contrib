default:
all_set:
  metrics:
    system.processes.count:
      enabled: true
      attributes: ["status"]
    system.processes.created:
      enabled: true
reaggregate_set:
  metrics:
    system.processes.count:
      enabled: true
      attributes: []
    system.processes.created:
      enabled: true
none_set:
  metrics:
    system.processes.count:
      enabled: false
      attributes: ["status"]
    system.processes.created:
      enabled: false
