$defs:
  metric_config:
    description: MetricConfig provides common config for a particular metric.
    type: object
    properties:
      aggregation_strategy:
        type: string
      attributes:
        type: array
        items:
          type: string
      enabled:
        type: boolean
  metrics_builder_config:
    description: MetricsBuilderConfig is a configuration for load metrics builder.
    type: object
    properties:
      metrics:
        $ref: metrics_config
  metrics_config:
    description: MetricsConfig provides config for load metrics.
    type: object
    properties:
      system.cpu.load_average.1m:
        $ref: metric_config
      system.cpu.load_average.5m:
        $ref: metric_config
      system.cpu.load_average.15m:
        $ref: metric_config
