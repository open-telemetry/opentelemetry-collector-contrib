$defs:
  attribute_direction:
    description: AttributeDirection specifies the value direction attribute.
    type: integer
  attribute_state:
    description: AttributeState specifies the value state attribute.
    type: integer
  attribute_type:
    description: AttributeType specifies the value type attribute.
    type: integer
  metric_config:
    description: MetricConfig provides common config for a particular metric.
    type: object
    properties:
      enabled:
        type: boolean
  metrics_builder_config:
    description: MetricsBuilderConfig is a configuration for paging metrics builder.
    type: object
    properties:
      metrics:
        $ref: metrics_config
  metrics_config:
    description: MetricsConfig provides config for paging metrics.
    type: object
    properties:
      system.paging.faults:
        $ref: metric_config
      system.paging.operations:
        $ref: metric_config
      system.paging.usage:
        $ref: metric_config
      system.paging.utilization:
        $ref: metric_config
