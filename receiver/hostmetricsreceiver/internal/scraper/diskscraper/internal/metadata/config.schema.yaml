$defs:
  attribute_direction:
    description: AttributeDirection specifies the value direction attribute.
    type: integer
  metric_config:
    description: MetricConfig provides common config for a particular metric.
    type: object
    properties:
      aggregation_strategy:
        type: string
      attributes:
        type: array
        items:
          type: string
      enabled:
        type: boolean
  metrics_builder_config:
    description: MetricsBuilderConfig is a configuration for disk metrics builder.
    type: object
    properties:
      metrics:
        $ref: metrics_config
  metrics_config:
    description: MetricsConfig provides config for disk metrics.
    type: object
    properties:
      system.disk.io:
        $ref: metric_config
      system.disk.io_time:
        $ref: metric_config
      system.disk.merged:
        $ref: metric_config
      system.disk.operation_time:
        $ref: metric_config
      system.disk.operations:
        $ref: metric_config
      system.disk.pending_operations:
        $ref: metric_config
      system.disk.weighted_io_time:
        $ref: metric_config
