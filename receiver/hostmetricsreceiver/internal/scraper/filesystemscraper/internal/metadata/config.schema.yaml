$defs:
  attribute_state:
    description: AttributeState specifies the value state attribute.
    type: integer
  metric_config:
    description: MetricConfig provides common config for a particular metric.
    type: object
    properties:
      aggregation_strategy:
        type: string
      attributes:
        type: array
        items:
          type: string
      enabled:
        type: boolean
  metrics_builder_config:
    description: MetricsBuilderConfig is a configuration for filesystem metrics builder.
    type: object
    properties:
      metrics:
        $ref: metrics_config
  metrics_config:
    description: MetricsConfig provides config for filesystem metrics.
    type: object
    properties:
      system.filesystem.inodes.usage:
        $ref: metric_config
      system.filesystem.usage:
        $ref: metric_config
      system.filesystem.utilization:
        $ref: metric_config
