default:
all_set:
  metrics:
    process.context_switches:
      enabled: true
      attributes: ["type"]
    process.cpu.time:
      enabled: true
      attributes: ["state"]
    process.cpu.utilization:
      enabled: true
      attributes: ["state"]
    process.disk.io:
      enabled: true
      attributes: ["direction"]
    process.disk.operations:
      enabled: true
      attributes: ["direction"]
    process.handles:
      enabled: true
    process.memory.usage:
      enabled: true
    process.memory.utilization:
      enabled: true
    process.memory.virtual:
      enabled: true
    process.open_file_descriptors:
      enabled: true
    process.paging.faults:
      enabled: true
      attributes: ["type"]
    process.signals_pending:
      enabled: true
    process.threads:
      enabled: true
    process.uptime:
      enabled: true
  resource_attributes:
    process.cgroup:
      enabled: true
    process.command:
      enabled: true
    process.command_line:
      enabled: true
    process.executable.name:
      enabled: true
    process.executable.path:
      enabled: true
    process.owner:
      enabled: true
    process.parent_pid:
      enabled: true
    process.pid:
      enabled: true
reaggregate_set:
  metrics:
    process.context_switches:
      enabled: true
      attributes: []
    process.cpu.time:
      enabled: true
      attributes: []
    process.cpu.utilization:
      enabled: true
      attributes: []
    process.disk.io:
      enabled: true
      attributes: []
    process.disk.operations:
      enabled: true
      attributes: []
    process.handles:
      enabled: true
    process.memory.usage:
      enabled: true
    process.memory.utilization:
      enabled: true
    process.memory.virtual:
      enabled: true
    process.open_file_descriptors:
      enabled: true
    process.paging.faults:
      enabled: true
      attributes: []
    process.signals_pending:
      enabled: true
    process.threads:
      enabled: true
    process.uptime:
      enabled: true
  resource_attributes:
    process.cgroup:
      enabled: true
    process.command:
      enabled: true
    process.command_line:
      enabled: true
    process.executable.name:
      enabled: true
    process.executable.path:
      enabled: true
    process.owner:
      enabled: true
    process.parent_pid:
      enabled: true
    process.pid:
      enabled: true
none_set:
  metrics:
    process.context_switches:
      enabled: false
      attributes: ["type"]
    process.cpu.time:
      enabled: false
      attributes: ["state"]
    process.cpu.utilization:
      enabled: false
      attributes: ["state"]
    process.disk.io:
      enabled: false
      attributes: ["direction"]
    process.disk.operations:
      enabled: false
      attributes: ["direction"]
    process.handles:
      enabled: false
    process.memory.usage:
      enabled: false
    process.memory.utilization:
      enabled: false
    process.memory.virtual:
      enabled: false
    process.open_file_descriptors:
      enabled: false
    process.paging.faults:
      enabled: false
      attributes: ["type"]
    process.signals_pending:
      enabled: false
    process.threads:
      enabled: false
    process.uptime:
      enabled: false
  resource_attributes:
    process.cgroup:
      enabled: false
    process.command:
      enabled: false
    process.command_line:
      enabled: false
    process.executable.name:
      enabled: false
    process.executable.path:
      enabled: false
    process.owner:
      enabled: false
    process.parent_pid:
      enabled: false
    process.pid:
      enabled: false
filter_set_include:
  resource_attributes:
    process.cgroup:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.command:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.command_line:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.executable.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.executable.path:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.owner:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.parent_pid:
      enabled: true
      metrics_include:
        - regexp: ".*"
    process.pid:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    process.cgroup:
      enabled: true
      metrics_exclude:
        - strict: "process.cgroup-val"
    process.command:
      enabled: true
      metrics_exclude:
        - strict: "process.command-val"
    process.command_line:
      enabled: true
      metrics_exclude:
        - strict: "process.command_line-val"
    process.executable.name:
      enabled: true
      metrics_exclude:
        - strict: "process.executable.name-val"
    process.executable.path:
      enabled: true
      metrics_exclude:
        - strict: "process.executable.path-val"
    process.owner:
      enabled: true
      metrics_exclude:
        - strict: "process.owner-val"
    process.parent_pid:
      enabled: true
      metrics_exclude:
        - regexp: ".*"
    process.pid:
      enabled: true
      metrics_exclude:
        - regexp: ".*"
