type: network

status:
  class: scraper
  stability:
    beta: [metrics]
  distributions: [core, contrib, k8s]
  codeowners:
    active: [dmitryax, braydonk, rogercoll]

reaggregation_enabled: true

sem_conv_version: 1.9.0

attributes:
  device:
    description: Name of the network interface.
    type: string
    requirement_level: recommended
  direction:
    description: Direction of flow of bytes/operations (receive or transmit).
    type: string
    requirement_level: recommended
    enum: [receive, transmit]
  network.interface.name:
    description: The name of the network interface.
    type: string
    requirement_level: recommended
  network.io.direction:
    description: The network IO operation direction.
    type: string
    enum:
      - transmit
      - receive
    requirement_level: recommended
  protocol:
    description: Network protocol, e.g. TCP or UDP.
    type: string
    requirement_level: recommended
    enum: [tcp]
  state:
    description: State of the network connection.
    type: string
    requirement_level: recommended

metrics:
  system.network.bandwidth.limit:
    enabled: false
    description: Available link bandwidth for the network interface, derived from the reported link speed.
    unit: By/s
    stability: development
    gauge:
      value_type: int
    attributes: [network.interface.name, network.io.direction]
  system.network.connections:
    enabled: true
    description: The number of connections.
    unit: "{connections}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
    attributes: [protocol, state]
  system.network.conntrack.count:
    enabled: false
    description: The count of entries in conntrack table.
    unit: "{entries}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
  system.network.conntrack.max:
    enabled: false
    description: The limit for entries in the conntrack table.
    unit: "{entries}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
  system.network.dropped:
    enabled: true
    description: The number of packets dropped.
    unit: "{packets}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
  system.network.errors:
    enabled: true
    description: The number of errors encountered.
    unit: "{errors}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
  system.network.io:
    enabled: true
    description: The number of bytes transmitted and received.
    unit: "By"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
  system.network.packets:
    enabled: true
    description: The number of packets transferred.
    unit: "{packets}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
