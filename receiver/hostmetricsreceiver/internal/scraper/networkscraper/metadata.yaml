type: network

status:
  class: scraper
  stability:
    beta: [metrics]
  distributions: [core, contrib, k8s]
  codeowners:
    active: [dmitryax, braydonk, rogercoll]

reaggregation_enabled: true

sem_conv_version: 1.9.0

attributes:
  device:
    description: Name of the network interface.
    type: string
    requirement_level: recommended
  direction:
    description: Direction of flow of bytes/operations (receive or transmit).
    type: string
    requirement_level: recommended
    enum: [receive, transmit]
  process.name:
    description: The name of the process associated with the local end of the connection.
    type: string
    requirement_level: recommended
  protocol:
    description: Network protocol, e.g. TCP or UDP.
    type: string
    requirement_level: recommended
    enum: [tcp]
  server.address:
    description: The remote address of the network connection.
    type: string
    requirement_level: recommended
  server.port:
    description: The remote port of the network connection.
    type: int
    requirement_level: recommended
  state:
    description: State of the network connection.
    type: string
    requirement_level: recommended

metrics:
  system.network.connection.count:
    enabled: false
    description: The number of network connections, grouped by process and remote endpoint.
    unit: "{connections}"
    stability: development
    gauge:
      value_type: int
    attributes: [process.name, server.address, server.port]
  system.network.connections:
    enabled: true
    description: The number of connections.
    unit: "{connections}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
    attributes: [protocol, state]
  system.network.conntrack.count:
    enabled: false
    description: The count of entries in conntrack table.
    unit: "{entries}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
  system.network.conntrack.max:
    enabled: false
    description: The limit for entries in the conntrack table.
    unit: "{entries}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: false
  system.network.dropped:
    enabled: true
    description: The number of packets dropped.
    unit: "{packets}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
  system.network.errors:
    enabled: true
    description: The number of errors encountered.
    unit: "{errors}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
  system.network.io:
    enabled: true
    description: The number of bytes transmitted and received.
    unit: "By"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
  system.network.packets:
    enabled: true
    description: The number of packets transferred.
    unit: "{packets}"
    stability: development
    sum:
      value_type: int
      aggregation_temporality: cumulative
      monotonic: true
    attributes: [device, direction]
