default:
all_set:
  metrics:
    sshcheck.duration:
      enabled: true
      attributes: []
    sshcheck.error:
      enabled: true
      attributes: ["error.message"]
    sshcheck.sftp_duration:
      enabled: true
      attributes: []
    sshcheck.sftp_error:
      enabled: true
      attributes: ["error.message"]
    sshcheck.sftp_status:
      enabled: true
      attributes: []
    sshcheck.status:
      enabled: true
      attributes: []
  resource_attributes:
    ssh.endpoint:
      enabled: true
reaggregate_set:
  metrics:
    sshcheck.duration:
      enabled: true
      attributes: []
    sshcheck.error:
      enabled: true
      attributes: ["error.message"]
    sshcheck.sftp_duration:
      enabled: true
      attributes: []
    sshcheck.sftp_error:
      enabled: true
      attributes: ["error.message"]
    sshcheck.sftp_status:
      enabled: true
      attributes: []
    sshcheck.status:
      enabled: true
      attributes: []
  resource_attributes:
    ssh.endpoint:
      enabled: true
none_set:
  metrics:
    sshcheck.duration:
      enabled: false
      attributes: []
    sshcheck.error:
      enabled: false
      attributes: ["error.message"]
    sshcheck.sftp_duration:
      enabled: false
      attributes: []
    sshcheck.sftp_error:
      enabled: false
      attributes: ["error.message"]
    sshcheck.sftp_status:
      enabled: false
      attributes: []
    sshcheck.status:
      enabled: false
      attributes: []
  resource_attributes:
    ssh.endpoint:
      enabled: false
filter_set_include:
  resource_attributes:
    ssh.endpoint:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    ssh.endpoint:
      enabled: true
      metrics_exclude:
        - strict: "ssh.endpoint-val"
