display_name: Cloud Foundry Receiver
type: cloudfoundry

description: |
  The Cloud Foundry Receiver connects to the RLP (Reverse Log Proxy) Gateway of the Cloud Foundry installation,
  typically available at the URL `https://log-stream.<cf-system-domain>`.

status:
  class: receiver
  stability:
    beta: [metrics]
    development: [logs]
  distributions: [contrib]
  codeowners:
    active: [crobert-1]
    emeritus: [agoallikmaa, pellared]
    seeking_new: true

feature_gates:
  - id: cloudfoundry.resourceAttributes.allow
    description: >-
      When enabled, envelope tags are copied to the metrics as resource attributes instead of datapoint attributes
    stage: beta
    from_version: "v0.117.0"
    reference_url: https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/34824
tests:
  config:
  skip_lifecycle: true
