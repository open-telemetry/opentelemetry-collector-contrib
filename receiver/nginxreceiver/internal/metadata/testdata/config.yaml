default:
all_set:
  metrics:
    nginx.connections_accepted:
      enabled: true
    nginx.connections_current:
      enabled: true
      attributes: ["state"]
    nginx.connections_handled:
      enabled: true
    nginx.requests:
      enabled: true
reaggregate_set:
  metrics:
    nginx.connections_accepted:
      enabled: true
    nginx.connections_current:
      enabled: true
      attributes: []
    nginx.connections_handled:
      enabled: true
    nginx.requests:
      enabled: true
none_set:
  metrics:
    nginx.connections_accepted:
      enabled: false
    nginx.connections_current:
      enabled: false
      attributes: ["state"]
    nginx.connections_handled:
      enabled: false
    nginx.requests:
      enabled: false
