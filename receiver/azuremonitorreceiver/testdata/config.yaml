azure_monitor/valid_subscription_ids:
  subscription_ids:
    - test
  credentials: default_credentials

azure_monitor/valid_discover_subscription:
  discover_subscriptions: true
  credentials: default_credentials

azure_monitor/missing_subscriptions:
  subscription_ids: []
  discover_subscriptions: false
  credentials: default_credentials

azure_monitor/invalid_cloud:
  discover_subscriptions: true
  cloud: invalid
  credentials: default_credentials

azure_monitor/missing_service_principal:
  discover_subscriptions: true
  credentials: service_principal

azure_monitor/missing_workload_identity:
  discover_subscriptions: true
  credentials: workload_identity

azure_monitor/invalid_credentials:
  discover_subscriptions: true
  credentials: invalid

azure_monitor/valid_authenticator:
  discover_subscriptions: true
  auth:
    authenticator: azureauth/monitor
  credentials: does-not-matter

azure_monitor/valid_authenticator_2:
  discover_subscriptions: true
  auth:
    authenticator: azureauth
  credentials: does-not-matter

azure_monitor/max_resources_per_batch_negative_value:
  discover_subscriptions: true
  auth:
    authenticator: azureauth
  credentials: does-not-matter
  use_batch_api: true
  maximum_resources_per_batch: -1

azure_monitor/append_tags_all:
  subscription_ids:
    - test
  credentials: default_credentials
  append_tags_as_attributes: ["*"]

azure_monitor/append_tags_specific:
  subscription_ids:
    - test
  credentials: default_credentials
  append_tags_as_attributes: ["service", "environment"]
